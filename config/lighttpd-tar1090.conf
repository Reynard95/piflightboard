# Flighttracker — local image aliases only
# /tar1090/data/, /tar1090/db-*, and /tar1090 are already defined by the
# tar1090 installer (88-tar1090.conf). Duplicating them causes lighttpd to
# crash with "Duplicate array-key" errors. Only define what tar1090 omits.
alias.url += ( "/tar1090/airline_logos/"  => "/opt/flighttracker/images/airline_logos/" )
alias.url += ( "/tar1090/country_flags/"  => "/opt/flighttracker/images/country_flags/" )
