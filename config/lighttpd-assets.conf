# Local asset aliases for flightboard — airline logos and country flags
# This file is managed by the flighttracker deploy script.
# It appends to lighttpd's alias map so the flightboard HTML can load
# /tar1090/airline_logos/ and /tar1090/country_flags/ from the repo's
# images/ directory rather than the tar1090 web root.

alias.url += (
  "/tar1090/airline_logos/"  => "/opt/flighttracker/images/airline_logos/",
  "/tar1090/country_flags/"  => "/opt/flighttracker/images/country_flags/"
)
