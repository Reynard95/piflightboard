# flightboard — standalone lighttpd config
# Replaces the tar1090-dependent 87-/88-/89- config split.
# Installed as /etc/lighttpd/conf-enabled/50-flightboard.conf

server.modules += ( "mod_alias", "mod_proxy" )

# Note: server.document-root is set in /etc/lighttpd/lighttpd.conf directly
# by install.sh (via sed) — lighttpd rejects duplicate assignments.

# readsb ADS-B data (updated ~1s by the readsb service)
alias.url += ( "/data/" => "/run/readsb/" )

# Local asset directories (served from the repo, not the web root)
alias.url += ( "/airline_logos/" => "/opt/flighttracker/images/airline_logos/" )
alias.url += ( "/country_flags/" => "/opt/flighttracker/images/country_flags/" )

# Aircraft hex database (cloned from wiedehopf/tar1090-db, no versioned hash needed)
alias.url += ( "/db/" => "/opt/flighttracker/db/" )

# Settings API — proxy /api/ to the settings-api.py service (port 8089)
# The frontend never needs to know the port; auth tokens stay same-origin.
proxy.server = (
  "/api/" => ( ( "host" => "127.0.0.1", "port" => 8089 ) )
)

# Never expose directory listings
dir-listing.activate = "disable"
