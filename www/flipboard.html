<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flight Board</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&display=swap" rel="stylesheet">
<link rel="stylesheet" href="flipboard.css">
</head>
<body>
<div class="board">

  <div class="hdr">
    <span class="hdr-title">✈ DEPARTURES</span>
    <div class="hdr-right">
      <button class="theme-btn" id="theme-btn" onclick="typeof cycleTheme==='function'&&cycleTheme()">AMBER</button>
      <span class="hdr-clock" id="clock">00:00:00</span>
    </div>
  </div>

  <div class="col-hdrs">
    <div class="ch ch-flight">FLIGHT</div>
    <div class="ch ch-apt">FROM</div>
    <div class="ch ch-apt">TO</div>
    <div class="ch ch-alt">ALT FT</div>
    <div class="ch ch-spd">SPD KT</div>
    <div class="ch ch-stat">STATUS</div>
  </div>

  <div class="rows" id="rows"></div>

</div>
<script src="data.js"></script>
<script src="themes.js"></script>
<script src="flipboard.js"></script>
</body>
</html>
