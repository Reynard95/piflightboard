<!DOCTYPE html>
<html lang="en" data-theme-default="white">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flight Display</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&display=swap" rel="stylesheet">
<link rel="stylesheet" href="main.css">
<link rel="stylesheet" href="main-focus.css">
<!--
  URL parameters (combine freely):

  ?focus                focus layout — giant route airports, compact 6-field strip
                        (default: full layout — data grid + telemetry row)

  ?theme=white          white bg, black text (default)
  ?theme=black          black bg, white text
  ?theme=color          dark bg, amber text
  ?theme=airbus         steel blue on dark navy
  ?theme=boeing         gold on dark brown
  ?theme=embraer        teal on dark green
  ?theme=bombardier     coral red on near-black
  ?theme=military       green on near-black

  ?orientation=portrait stacked vertical route (default: landscape)

  ?res=800x480          pixel-perfect sizing for known e-ink panels (focus mode only)
                        400x300  648x480  800x480  1200x825  1404x1872  1600x1200

  ?radius=N             show only aircraft within N km of the receiver
  ?closest              always show the nearest aircraft (no cycling)
  ?refresh=N            fetch interval in seconds (min 5, default 10)

  Examples:
    main.html
    main.html?focus
    main.html?focus&theme=black&res=800x480
    main.html?focus&orientation=portrait&res=480x800
    main.html?theme=color&closest&radius=30
    main.html?focus&closest&refresh=30&theme=white&res=800x480
-->
</head>
<body>
<div class="board">

  <div class="main" id="main">
    <div class="no-signal">
      <div class="no-signal-title">SCANNING...</div>
      <div class="no-signal-sub">✈︎ AWAITING AIRCRAFT DATA ✈︎</div>
    </div>
  </div>

  <div class="footer">
    <div class="ac-count" id="ac-count">0 AC</div>
    <div class="ac-list"  id="ac-list"></div>
  </div>

</div>

<script src="data.js"></script>
<script src="themes.js"></script>
<script src="main.js"></script>
</body>
</html>
