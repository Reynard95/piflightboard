<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flight Display</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --amber: #FFA040; --amber-dim: #6B3A00; --amber-bright: #FFD080;
  --bg: #000; --red: #FF4040; --green: #40FF80;
}
html, body { width: 100%; height: 100%; background: var(--bg); color: var(--amber); font-family: 'Share Tech Mono', monospace; overflow: hidden; }
body::before { content: ''; position: fixed; inset: 0; background-image: radial-gradient(circle, rgba(255,160,64,0.06) 1px, transparent 1px); background-size: 6px 6px; pointer-events: none; z-index: 200; }
body::after  { content: ''; position: fixed; inset: 0; background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,0.08) 3px, rgba(0,0,0,0.08) 4px); pointer-events: none; z-index: 201; }

.board { width: 100vw; height: 100vh; display: grid; grid-template-rows: auto 1fr auto; padding: 24px 48px; }

/* ── TOP BAR ── */
.topbar { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--amber-dim); padding-bottom: 12px; margin-bottom: 16px; }
.topbar-left { font-size: 15px; color: var(--amber-dim); letter-spacing: 0.2em; line-height: 1.7; }
.topbar-title { font-family: 'VT323', monospace; font-size: 26px; letter-spacing: 0.3em; text-shadow: 0 0 20px var(--amber); }
.topbar-right { text-align: right; }
.clock { font-family: 'VT323', monospace; font-size: 30px; color: var(--amber); text-shadow: 0 0 15px var(--amber); }
.date-line { font-size: 12px; color: var(--amber-dim); letter-spacing: 0.12em; margin-top: 2px; }

/* ── MAIN ── */
.main { display: flex; flex-direction: column; gap: 16px; justify-content: center; }

/* ── AIRCRAFT HEADER ── */
.ac-header { display: flex; align-items: center; gap: 28px; padding-bottom: 16px; border-bottom: 1px solid var(--amber-dim); }
.logo-box { width: 180px; height: 88px; flex-shrink: 0; border: 1px solid var(--amber-dim); border-radius: 4px; background: rgba(255,255,255,0.95); display: flex; align-items: center; justify-content: center; overflow: hidden; }
.logo-box img { max-width: 168px; max-height: 76px; object-fit: contain; }
.logo-fallback { font-family: 'VT323', monospace; font-size: 40px; color: var(--amber-dim); background: transparent; }

.ac-identity { flex: 1; min-width: 0; }
.airline-name { font-family: 'VT323', monospace; font-size: 68px; line-height: 1; text-shadow: 0 0 30px var(--amber); letter-spacing: 0.04em; white-space: nowrap; }
.ac-subrow { display: flex; align-items: center; gap: 20px; margin-top: 6px; flex-wrap: wrap; }
.callsign-val { font-family: 'VT323', monospace; font-size: 38px; color: var(--amber-bright); letter-spacing: 0.15em; }
.ac-subrow-sep { color: var(--amber-dim); font-size: 18px; }
.ac-type-line { font-family: 'VT323', monospace; font-size: 28px; color: var(--amber-dim); letter-spacing: 0.12em; margin-top: 4px; }
.ac-reg-line  { font-size: 15px; color: var(--amber-dim); letter-spacing: 0.2em; margin-top: 2px; }

/* ── DATA GRID — 3 columns ── */
.data-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 0 36px; }
.data-row { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--amber-dim); }
.data-label { font-size: 18px; color: var(--amber-dim); letter-spacing: 0.25em; white-space: nowrap; }
.data-value { font-family: 'VT323', monospace; font-size: 56px; line-height: 1; text-shadow: 0 0 20px var(--amber); letter-spacing: 0.04em; text-align: right; }
.data-value .unit { font-size: 22px; color: var(--amber-dim); margin-left: 4px; }
.v-blue  { color: #64C8FF; text-shadow: 0 0 20px rgba(100,200,255,0.8); }
.v-gold  { color: #FFAA00; text-shadow: 0 0 20px rgba(255,170,0,0.8); }
.v-pink  { color: #FF66FF; text-shadow: 0 0 20px rgba(255,102,255,0.8); }
.v-green { color: var(--green); text-shadow: 0 0 20px var(--green); }
.v-red   { color: var(--red);   text-shadow: 0 0 20px var(--red); }

/* ── EXTENDED TELEMETRY ── */
.telem-row { display: flex; gap: 0; border-top: 1px solid var(--amber-dim); padding-top: 12px; flex-wrap: wrap; }
.telem-cell { flex: 1; min-width: 100px; display: flex; flex-direction: column; gap: 3px; padding: 0 16px 0 0; }
.telem-cell:first-child { padding-left: 0; }
.telem-cell + .telem-cell { border-left: 1px solid var(--amber-dim); padding-left: 16px; }
.telem-lbl  { font-size: 12px; color: var(--amber-dim); letter-spacing: 0.22em; text-transform: uppercase; }
.telem-val  { font-family: 'VT323', monospace; font-size: 30px; text-shadow: 0 0 10px var(--amber); letter-spacing: 0.08em; line-height: 1.1; }
.telem-unit { font-size: 12px; color: var(--amber-dim); }

/* ── NO SIGNAL ── */
.no-signal { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; gap: 24px; animation: blink 1.5s step-end infinite; }
.no-signal-title { font-family: 'VT323', monospace; font-size: 72px; letter-spacing: 0.3em; color: var(--amber-dim); }
.no-signal-sub   { font-size: 18px; letter-spacing: 0.2em; color: var(--amber-dim); }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
.fade-in { animation: fadeIn 0.6s ease; }
@keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }

/* ── FOOTER ── */
.footer { border-top: 1px solid var(--amber-dim); padding-top: 12px; margin-top: 12px; display: flex; align-items: center; gap: 24px; overflow: hidden; }
.ticker-label { font-size: 12px; color: var(--amber-dim); letter-spacing: 0.2em; white-space: nowrap; }
.ticker-track { flex: 1; overflow: hidden; }
.ticker-inner { display: flex; gap: 48px; white-space: nowrap; animation: ticker 30s linear infinite; }
.ticker-item  { font-family: 'VT323', monospace; font-size: 24px; color: var(--amber-dim); letter-spacing: 0.15em; cursor: pointer; transition: color 0.2s; }
.ticker-item:hover  { color: var(--amber); }
.ticker-item.active { color: var(--amber-bright); text-shadow: 0 0 10px var(--amber); }
.ticker-sep { color: var(--amber-dim); opacity: 0.3; }
@keyframes ticker { 0%{transform:translateX(0)} 100%{transform:translateX(-50%)} }
.ac-count { font-size: 12px; color: var(--amber-dim); letter-spacing: 0.15em; white-space: nowrap; }
.progress-bar { position: fixed; bottom: 0; left: 0; height: 2px; background: var(--amber); box-shadow: 0 0 8px var(--amber); transition: width linear; }
</style>
</head>
<body>
<div class="board">
  <div class="topbar">
    <div class="topbar-left">
      <div>ADS-B RECEIVER · GOUDA NL</div>
      <div id="msg-count" style="font-size:12px;margin-top:1px">MESSAGES: —</div>
    </div>
    <div class="topbar-title">▶ FLIGHT DISPLAY</div>
    <div class="topbar-right">
      <div class="clock" id="clock">00:00:00</div>
      <div class="date-line" id="date-line"></div>
    </div>
  </div>

  <div class="main" id="main">
    <div class="no-signal">
      <div class="no-signal-title">SCANNING...</div>
      <div class="no-signal-sub">AWAITING AIRCRAFT DATA</div>
    </div>
  </div>

  <div class="footer">
    <div class="ticker-label">NOW TRACKING</div>
    <div class="ticker-track"><div class="ticker-inner" id="ticker"></div></div>
    <div class="ac-count" id="ac-count">0 AIRCRAFT</div>
  </div>
</div>
<div class="progress-bar" id="progress" style="width:0%"></div>

<script>
const AIRCRAFT_JSON = '/tar1090/data/aircraft.json';
const ROUTE_API     = 'http://flighttracker.local:8088';
const DB_PATH       = '/tar1090/db-28a5940/';
const CYCLE_MS      = 15000;
const FETCH_MS      = 5000;

/* ── AIRLINE DATA (ICAO prefixes only) ── */
const AIRLINES = {
  AAL:'AMERICAN AIRLINES',   AFR:'AIR FRANCE',          AHY:'AZERBAIJAN AIRLINES',
  ANA:'ALL NIPPON AIRWAYS',  AUA:'AUSTRIAN AIRLINES',   AZA:'ITA AIRWAYS',
  BAW:'BRITISH AIRWAYS',     BEL:'BRUSSELS AIRLINES',   BOX:'DHL AIR',
  CCA:'AIR CHINA',           CES:'CHINA EASTERN',       CLX:'CARGOLUX',
  CSN:'CHINA SOUTHERN',      DAL:'DELTA AIR LINES',     DLH:'LUFTHANSA',
  ETH:'ETHIOPIAN AIRLINES',  EXS:'JET2',                EZY:'EASYJET',
  FDX:'FEDEX EXPRESS',       FIN:'FINNAIR',             GEC:'LUFTHANSA CARGO',
  IBE:'IBERIA',              JAL:'JAPAN AIRLINES',      KLM:'KLM',
  MPH:'MARTINAIR CARGO',     MSR:'EGYPTAIR',            NOS:'NORWEGIAN',
  NSZ:'NETHERLANDS COASTGUARD', OAL:'OLYMPIC AIR',     PGT:'PEGASUS',
  QTR:'QATAR AIRWAYS',       RAM:'ROYAL AIR MAROC',     RYR:'RYANAIR',
  SAS:'SCANDINAVIAN',        SVA:'SAUDIA',              SWR:'SWISS',
  SXS:'SUN EXPRESS',         TAP:'TAP AIR PORTUGAL',    TCX:'TUI AIRWAYS',
  TFL:'TRANSAVIA FRANCE',    TGW:'TUI FLY NORDIC',      THY:'TURKISH AIRLINES',
  TOM:'TUI FLY',             TRA:'TRANSAVIA',           TUI:'TUI',
  UAE:'EMIRATES',            UAL:'UNITED AIRLINES',     UPS:'UPS AIRLINES',
  VKG:'THOMAS COOK',         VLG:'VUELING',             WZZ:'WIZZ AIR',
};
/* ICAO airline code → ISO 2-letter country code (for local flag images) */
const ICAO_TO_COUNTRY = {
  AAL:'US', AFR:'FR', AHY:'AZ', ANA:'JP', AUA:'AT', AZA:'IT',
  BAW:'GB', BEL:'BE', BOX:'GB', CCA:'CN', CES:'CN', CLX:'LU',
  CSN:'CN', DAL:'US', DLH:'DE', ETH:'ET', EXS:'GB', EZY:'GB',
  FDX:'US', FIN:'FI', GEC:'DE', IBE:'ES', JAL:'JP', KLM:'NL',
  MPH:'NL', MSR:'EG', NOS:'NO', NSZ:'NL', OAL:'GR', PGT:'TR',
  QTR:'QA', RAM:'MA', RYR:'IE', SAS:'SE', SVA:'SA', SWR:'CH',
  SXS:'TR', TAP:'PT', TCX:'GB', TFL:'FR', TGW:'SE', THY:'TR',
  TOM:'BE', TRA:'NL', TUI:'DE', UAE:'AE', UAL:'US', UPS:'US',
  VKG:'GB', VLG:'ES', WZZ:'HU',
};

/* ── AIRCRAFT TYPE TABLE ── */
const AC_TYPES = {
  A306:'Airbus A300-600',   A30B:'Airbus A300B',      A310:'Airbus A310',
  A318:'Airbus A318',       A319:'Airbus A319',        A320:'Airbus A320',
  A321:'Airbus A321',       A332:'Airbus A330-200',    A333:'Airbus A330-300',
  A338:'Airbus A330-800',   A339:'Airbus A330-900',    A342:'Airbus A340-200',
  A343:'Airbus A340-300',   A345:'Airbus A340-500',    A346:'Airbus A340-600',
  A359:'Airbus A350-900',   A35K:'Airbus A350-1000',   A388:'Airbus A380-800',
  A20N:'Airbus A320neo',    A21N:'Airbus A321neo',     A19N:'Airbus A319neo',
  A32S:'Airbus A320 Sharklet', A33N:'Airbus A330neo',
  B712:'Boeing 717',        B737:'Boeing 737-700',     B738:'Boeing 737-800',
  B739:'Boeing 737-900',    B37M:'Boeing 737 MAX 7',   B38M:'Boeing 737 MAX 8',
  B39M:'Boeing 737 MAX 9',  B3XM:'Boeing 737 MAX 10',  B744:'Boeing 747-400',
  B748:'Boeing 747-8',      B752:'Boeing 757-200',     B753:'Boeing 757-300',
  B762:'Boeing 767-200',    B763:'Boeing 767-300',     B764:'Boeing 767-400',
  B772:'Boeing 777-200',    B77L:'Boeing 777-200LR',   B77W:'Boeing 777-300ER',
  B778:'Boeing 777X-8',     B779:'Boeing 777X-9',      B788:'Boeing 787-8',
  B789:'Boeing 787-9',      B78X:'Boeing 787-10',
  E135:'Embraer ERJ-135',   E145:'Embraer ERJ-145',    E170:'Embraer E170',
  E175:'Embraer E175',      E190:'Embraer E190',        E195:'Embraer E195',
  E75L:'Embraer E175-E2',   E290:'Embraer E190-E2',    E295:'Embraer E195-E2',
  AT43:'ATR 42-300',        AT45:'ATR 42-500',          AT72:'ATR 72',
  AT75:'ATR 72-500',        AT76:'ATR 72-600',
  DH8A:'Dash 8-100',        DH8D:'Dash 8-400',          DH8Q:'Dash 8-Q400',
  CRJ2:'CRJ-200',           CRJ7:'CRJ-700',             CRJ9:'CRJ-900',
  CRJX:'CRJ-1000',          F50:'Fokker 50',            F70:'Fokker 70',
  F100:'Fokker 100',        MD11:'MD-11',               MD82:'MD-82',
  MD83:'MD-83',             DC10:'Douglas DC-10',
  IL76:'Ilyushin IL-76',    SU95:'Sukhoi Superjet',
  C130:'C-130 Hercules',    C17:'Boeing C-17',
  PC12:'Pilatus PC-12',     C208:'Cessna Caravan',      C172:'Cessna 172',
  PA28:'Piper Cherokee',    BE20:'King Air 200',
  GL5T:'Global 5000',       GLEX:'Global Express',      CL60:'Challenger 600',
  C56X:'Citation Excel',    C680:'Citation Sovereign',  C750:'Citation X',
  F2TH:'Falcon 2000',       F900:'Falcon 900',          GLF4:'Gulfstream IV',
  GLF5:'Gulfstream V',      GL7T:'Gulfstream G700',
  SR22:'Cirrus SR22',       E50P:'Phenom 100',          E55P:'Phenom 300',
};

/* ── TAR1090 DB LOOKUP ── */
const dbCache = {};

async function lookupHex(hex) {
  if (!hex) return null;
  const h = hex.toUpperCase();
  if (dbCache[h] !== undefined) return dbCache[h];
  dbCache[h] = null;

  /* tar1090 db files use variable-length prefixes.
     Try longest first: 3-char, 2-char, 1-char.
     Files are plain JSON objects: {"HEXCODE":["reg","type","flags","desc"]} */
  const prefixes = [h.slice(0,3), h.slice(0,2), h.slice(0,1)];
  for (const pfx of prefixes) {
    try {
      const data = await loadDbFile(pfx);
      if (data && data[h]) {
        const row = data[h];
        dbCache[h] = { reg: row[0] || '', type: row[1] || '', desc: row[3] || '' };
        return dbCache[h];
      }
    } catch(e) {}
  }
  return null;
}

const fileCache = {};
async function loadDbFile(prefix) {
  if (fileCache[prefix] !== undefined) return fileCache[prefix];
  fileCache[prefix] = null;
  try {
    const res = await fetch(`${DB_PATH}${prefix}.js?_=1`);
    if (!res.ok) return null;
    const text = await res.text();
    /* Format is plain JSON object: {"HEXCODE":["reg","type","flags","desc"],...} */
    const data = JSON.parse(text);
    fileCache[prefix] = data;
    return data;
  } catch(e) { return null; }
}

/* ── HELPERS ── */
function srcLabel(t) {
  if (!t) return '---';
  if (t.startsWith('adsb')) return 'ADS-B';
  if (t === 'mlat')          return 'MLAT';
  if (t.startsWith('tisb'))  return 'TIS-B';
  if (t.startsWith('adsr'))  return 'ADS-R';
  if (t === 'mode_s')        return 'MODE-S';
  return t.toUpperCase();
}

function getTypeName(t) {
  if (!t) return '';
  const key = t.trim().toUpperCase();
  return AC_TYPES[key] ? AC_TYPES[key].toUpperCase() : key;
}

function getAirlineCode(cs) {
  if (!cs) return null;
  const u = cs.trim().toUpperCase();
  for (const k of Object.keys(AIRLINES)) if (u.startsWith(k)) return k;
  return u.slice(0, 3);
}

/* ── STATE ── */
let allAircraft = [], currentIndex = 0, routeCache = {}, cycleTimer = null;

/* ── CLOCK ── */
function tick() {
  const n = new Date();
  document.getElementById('clock').textContent = n.toTimeString().slice(0, 8);
  document.getElementById('date-line').textContent =
    n.toLocaleDateString('en-GB', { day:'2-digit', month:'short', year:'numeric' }).toUpperCase();
}
setInterval(tick, 1000); tick();

function fmt(v, d = 0) {
  if (v == null || isNaN(v)) return '---';
  return Number(v).toLocaleString('en-GB', { maximumFractionDigits: d, minimumFractionDigits: d });
}

/* ── ROUTE PROXY ── */
async function fetchRoute(ac) {
  const cs = (ac.flight || '').trim();
  if (!cs || routeCache[cs] !== undefined) return routeCache[cs] || null;
  routeCache[cs] = null;
  try {
    const res = await fetch(ROUTE_API, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ icao: ac.hex, callsign: cs, lat: ac.lat || 0, lng: ac.lon || 0, postime: Date.now() })
    });
    if (!res.ok) return null;
    const data = await res.json();
    const r = data?.route?.[0];
    if (r) { routeCache[cs] = r; return r; }
  } catch(e) {}
  return null;
}

/* ── FETCH AIRCRAFT.JSON ── */
async function fetchAircraft() {
  try {
    const res  = await fetch(AIRCRAFT_JSON + '?_=' + Date.now());
    const data = await res.json();
    document.getElementById('msg-count').textContent = 'MESSAGES: ' + (data.messages || 0).toLocaleString();
    allAircraft = (data.aircraft || [])
      .filter(a => a.lat && a.lon && a.flight && a.flight.trim())
      .sort((a, b) => (b.rssi || -99) - (a.rssi || -99));
    updateTicker();
    if (allAircraft.length > 0 && cycleTimer === null) startCycle();
  } catch(e) {}
}

function updateTicker() {
  document.getElementById('ac-count').textContent = allAircraft.length + ' AIRCRAFT';
  const items = allAircraft.slice(0, 30).map((ac, i) =>
    `<span class="ticker-item${i === currentIndex ? ' active' : ''}" onclick="showIndex(${i})">${ac.flight.trim()}</span><span class="ticker-sep"> ◆ </span>`
  ).join('');
  document.getElementById('ticker').innerHTML = items + items;
}

/* ── RENDER ── */
async function showIndex(idx) {
  if (!allAircraft.length) return;
  currentIndex = idx % allAircraft.length;
  const ac         = allAircraft[currentIndex];
  const icaoCode   = getAirlineCode(ac.flight);
  const countryCode = ICAO_TO_COUNTRY[icaoCode] || '';
  const airlineName = AIRLINES[icaoCode] || icaoCode || (ac.flight || '').trim();

  /* DB lookup for registration and type */
  const dbRow  = await lookupHex(ac.hex);
  const reg    = (ac.r || '').trim() || (dbRow?.reg || '').trim() || ac.hex.toUpperCase();
  const typeCode = (ac.t || '').trim() || (dbRow?.type || '').trim();
  const typeName = dbRow?.desc ? dbRow.desc.toUpperCase() : getTypeName(typeCode);

  const route = await fetchRoute(ac);

  /* Flight data */
  const vr      = ac.baro_rate || 0;
  const vrSign  = vr > 0 ? '+' : '';
  const vrClass = vr > 100 ? 'v-green' : vr < -100 ? 'v-red' : '';
  const vsStr   = ac.baro_rate != null ? vrSign + fmt(ac.baro_rate) : '---';
  const altBaro = ac.alt_baro === 'ground' ? 'GND' : fmt(ac.alt_baro);
  const speed   = fmt(ac.gs);
  const ias     = ac.ias   != null ? fmt(ac.ias)  + ' KTS' : '---';
  const mach    = ac.mach  != null ? 'M' + ac.mach.toFixed(3) : '---';
  const heading = ac.track != null ? fmt(ac.track) + '°' : '---';
  const dist    = ac.r_dst ? ac.r_dst.toFixed(1) + ' KM' : '---';
  const lat     = ac.lat   != null ? ac.lat.toFixed(3) + '°' : '--°';
  const lon     = ac.lon   != null ? ac.lon.toFixed(3) + '°' : '--°';
  const rssi    = ac.rssi  != null ? ac.rssi.toFixed(1) + ' dBFS' : '---';
  const source  = srcLabel(ac.type);
  const squawk  = ac.squawk || '----';
  const wind    = (ac.wd != null && ac.ws != null) ? `${fmt(ac.wd)}° / ${fmt(ac.ws)} KTS` : '---';
  const oat     = ac.oat   != null ? ac.oat.toFixed(1) + ' °C' : '---';
  const navHdg  = ac.nav_heading != null ? fmt(ac.nav_heading) + '°' : '---';
  const msgCount = ac.messages != null ? ac.messages.toLocaleString() : '---';
  const seen    = ac.seen  != null ? ac.seen.toFixed(1) + 'S AGO' : '---';

  let status = 'EN ROUTE';
  if (ac.alt_baro === 'ground') status = 'ON GROUND';
  else if (vr >  300) status = 'CLIMBING';
  else if (vr < -300) status = 'DESCENDING';

  const origin = route?.origin?.iata || '';
  const dest   = route?.destination?.iata || '';

  /* Local assets from repo */
  const logoUrl      = icaoCode ? `/tar1090/airline_logos/airline_logo_${icaoCode}.png` : '';
  const flagUrl      = countryCode ? `/tar1090/country_flags/country_flag_${countryCode}.png` : '';
  const flagHtml     = flagUrl
    ? `<img src="${flagUrl}" alt="${countryCode}" style="height:42px;width:auto;vertical-align:middle;border-radius:2px;" onerror="this.style.display='none'">`
    : '';
  const logoFallback = `<div class="logo-fallback">${icaoCode || '?'}</div>`;

  const squawkClass = ['7700','7500'].includes(squawk) ? 'v-red' : squawk === '7600' ? 'v-blue' : '';

  document.getElementById('main').innerHTML = `
    <div class="fade-in">

      <div class="ac-header">
        <div class="logo-box" id="logo-wrap">
          ${logoUrl ? `<img id="alogo" src="${logoUrl}" alt="${icaoCode}">` : logoFallback}
        </div>
        <div class="ac-identity">
          <div class="airline-name">${airlineName} ${flagHtml}</div>
          <div class="ac-subrow">
            <span class="callsign-val">${(ac.flight || '').trim()}</span>
            ${origin && dest ? `<span class="ac-subrow-sep">·</span><span class="callsign-val" style="color:var(--amber-dim)">${origin} ▶ ${dest}</span>` : ''}
          </div>
          <div class="ac-type-line">${typeName || '—'}</div>
          <div class="ac-reg-line">REG: ${reg}</div>
        </div>
      </div>

      <div class="data-grid">
        <div class="data-row">
          <div class="data-label">HEADING</div>
          <div class="data-value v-blue">${heading}</div>
        </div>
        <div class="data-row">
          <div class="data-label">ALTITUDE</div>
          <div class="data-value">${altBaro} <span class="unit">FT</span></div>
        </div>
        <div class="data-row">
          <div class="data-label">STATUS</div>
          <div class="data-value v-gold">${status}</div>
        </div>
        <div class="data-row">
          <div class="data-label">DISTANCE</div>
          <div class="data-value v-pink">${dist}</div>
        </div>
        <div class="data-row">
          <div class="data-label">SPEED</div>
          <div class="data-value">${speed} <span class="unit">KTS</span></div>
        </div>
        <div class="data-row">
          <div class="data-label">VERT RATE</div>
          <div class="data-value ${vrClass}">${vsStr} <span class="unit">FPM</span></div>
        </div>
      </div>

      <div class="telem-row">
        <div class="telem-cell">
          <div class="telem-lbl">SOURCE</div>
          <div class="telem-val">${source}</div>
        </div>
        <div class="telem-cell">
          <div class="telem-lbl">SIGNAL</div>
          <div class="telem-val">${rssi}</div>
        </div>
        <div class="telem-cell">
          <div class="telem-lbl">SQUAWK</div>
          <div class="telem-val ${squawkClass}">${squawk}</div>
        </div>
        <div class="telem-cell">
          <div class="telem-lbl">IAS</div>
          <div class="telem-val">${ias}</div>
        </div>
        <div class="telem-cell">
          <div class="telem-lbl">MACH</div>
          <div class="telem-val">${mach}</div>
        </div>
        <div class="telem-cell">
          <div class="telem-lbl">WIND</div>
          <div class="telem-val">${wind}</div>
        </div>
        <div class="telem-cell">
          <div class="telem-lbl">OAT</div>
          <div class="telem-val">${oat}</div>
        </div>
        <div class="telem-cell">
          <div class="telem-lbl">NAV HDG</div>
          <div class="telem-val">${navHdg}</div>
        </div>
        <div class="telem-cell">
          <div class="telem-lbl">MSGS</div>
          <div class="telem-val">${msgCount}</div>
        </div>
        <div class="telem-cell">
          <div class="telem-lbl">LAST SEEN</div>
          <div class="telem-val">${seen}</div>
        </div>
        <div class="telem-cell">
          <div class="telem-lbl">LAT / LON</div>
          <div class="telem-val" style="font-size:20px">${lat} / ${lon}</div>
        </div>
      </div>

    </div>
  `;

  if (logoUrl) {
    const img  = document.getElementById('alogo');
    const wrap = document.getElementById('logo-wrap');
    const fb   = logoFallback;
    if (img) img.onerror = () => { wrap.innerHTML = fb; };
  }

  updateTicker();
  resetProgress();
}

function resetProgress() {
  const bar = document.getElementById('progress');
  bar.style.transition = 'none';
  bar.style.width = '0%';
  requestAnimationFrame(() => {
    bar.style.transition = `width ${CYCLE_MS}ms linear`;
    bar.style.width = '100%';
  });
}

function startCycle() {
  showIndex(0);
  cycleTimer = setInterval(() => {
    if (!allAircraft.length) return;
    currentIndex = (currentIndex + 1) % Math.min(allAircraft.length, 30);
    showIndex(currentIndex);
  }, CYCLE_MS);
}

setInterval(fetchAircraft, FETCH_MS);
fetchAircraft();
</script>
</body>
</html>
