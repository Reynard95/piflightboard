<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flight Display</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&display=swap" rel="stylesheet">
<link rel="stylesheet" href="flightboard.css">
</head>
<body>
<div class="board">
  <div class="topbar">
    <div class="topbar-left">
      <div>ADS-B RECEIVER · GOUDA NL</div>
      <div id="msg-count" style="font-size:12px;margin-top:1px">MESSAGES: —</div>
    </div>
    <div class="topbar-title">▶ FLIGHT DISPLAY</div>
    <div class="topbar-right">
      <div class="clock" id="clock">00:00:00</div>
      <div class="date-line" id="date-line"></div>
    </div>
  </div>

  <div class="main" id="main">
    <div class="no-signal">
      <div class="no-signal-title">SCANNING...</div>
      <div class="no-signal-sub">AWAITING AIRCRAFT DATA</div>
    </div>
  </div>

  <div class="footer">
    <div class="ticker-label">NOW TRACKING</div>
    <div class="ticker-track"><div class="ticker-inner" id="ticker"></div></div>
    <div class="ac-count" id="ac-count">0 AIRCRAFT</div>
  </div>
</div>
<div class="progress-bar" id="progress" style="width:0%"></div>

<script src="data.js"></script>
<script src="flightboard.js"></script>
</body>
</html>
