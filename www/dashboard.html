<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Flighttracker Cyberdeck</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/gridstack@10/dist/gridstack.min.css" rel="stylesheet">
<style>

/* ── Reset ────────────────────────────────────────────────── */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: #070705;
  font-family: 'Share Tech Mono', monospace;
  color: #2e2e28;
}

/* ── Cockpit shell ────────────────────────────────────────── */
.cockpit {
  width: 100vw;
  height: 100vh;
  display: flex;
  flex-direction: column;
  padding: 6px 8px 8px;
  gap: 6px;
  background:
    radial-gradient(ellipse 120% 80% at 50% -10%, #181814 0%, #070705 55%),
    repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(255,255,255,0.008) 39px, rgba(255,255,255,0.008) 40px),
    repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(255,255,255,0.008) 39px, rgba(255,255,255,0.008) 40px);
}

/* ── Cockpit header ───────────────────────────────────────── */
.cockpit-header {
  flex-shrink: 0;
  height: 28px;
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 0 6px;
  border-bottom: 1px solid #141410;
}

.hdr-logo {
  font-family: 'VT323', monospace;
  font-size: 17px;
  color: #302e28;
  letter-spacing: 0.35em;
  text-transform: uppercase;
  white-space: nowrap;
}

.hdr-divider {
  width: 1px;
  height: 14px;
  background: #181814;
  flex-shrink: 0;
}

.hdr-indicators {
  display: flex;
  align-items: center;
  gap: 10px;
  flex: 1;
  min-width: 0;
}

.hdr-dot {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: #3a3830;
  flex-shrink: 0;
}
.hdr-dot.ok   { background: #2a5a2a; box-shadow: 0 0 4px #2a5a2a; }
.hdr-dot.warn { background: #5a4a1a; box-shadow: 0 0 4px #5a4a1a; }

.hdr-status {
  font-size: 9px;
  color: #252520;
  letter-spacing: 0.28em;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.hdr-time {
  font-family: 'VT323', monospace;
  font-size: 19px;
  color: #2e2c26;
  letter-spacing: 0.15em;
  white-space: nowrap;
  flex-shrink: 0;
}

/* ── Toolbar (edit controls) ─────────────────────────────── */
.hdr-toolbar {
  display: flex;
  align-items: center;
  gap: 6px;
  flex-shrink: 0;
}

.hdr-btn {
  font-family: 'Share Tech Mono', monospace;
  font-size: 8px;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: #2a2820;
  background: linear-gradient(180deg, #1e1e1a 0%, #141412 100%);
  border: 1px solid #282820;
  border-radius: 3px;
  padding: 2px 6px;
  cursor: pointer;
  white-space: nowrap;
  transition: color 0.15s, border-color 0.15s;
  user-select: none;
}
.hdr-btn:hover {
  color: #5a5848;
  border-color: #3a3828;
}
.hdr-btn.active {
  color: #CC7020;
  border-color: #5a3a10;
  background: linear-gradient(180deg, #1e1810 0%, #141008 100%);
}

/* ── Grid container ───────────────────────────────────────── */
.grid-wrap {
  flex: 1;
  min-height: 0;
  overflow: hidden;
  position: relative;
}

/* Override GridStack defaults to fit our dark aesthetic */
.grid-stack {
  background: transparent !important;
}

.grid-stack-item-content {
  overflow: visible !important;
  background: transparent !important;
}

/* ── Panel (bezel) ────────────────────────────────────────── */
.panel {
  display: flex;
  flex-direction: column;
  gap: 4px;
  width: 100%;
  height: 100%;
  padding: 9px 9px 5px;
  border-radius: 9px;
  position: relative;

  background: linear-gradient(180deg, #1e1e1a 0%, #141412 50%, #101010 100%);
  box-shadow:
    0 6px 28px rgba(0,0,0,0.95),
    0 2px 6px  rgba(0,0,0,0.8),
    0 0 0 1px rgba(255,255,255,0.035),
    inset 0 -2px 4px rgba(0,0,0,0.7),
    inset 0  1px 0   rgba(255,255,255,0.06);
}

/* Corner mount brackets */
.panel::before {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 9px;
  pointer-events: none;
  background:
    linear-gradient(to right,  #2a2a24 0, #2a2a24 2px, transparent 2px) 5px  5px  / 10px 10px no-repeat,
    linear-gradient(to bottom, #2a2a24 0, #2a2a24 2px, transparent 2px) 5px  5px  / 10px 10px no-repeat,
    linear-gradient(to left,   #2a2a24 0, #2a2a24 2px, transparent 2px) calc(100% - 5px) 5px / 10px 10px no-repeat,
    linear-gradient(to bottom, #2a2a24 0, #2a2a24 2px, transparent 2px) calc(100% - 5px) 5px / 10px 10px no-repeat,
    linear-gradient(to right,  #2a2a24 0, #2a2a24 2px, transparent 2px) 5px  calc(100% - 5px) / 10px 10px no-repeat,
    linear-gradient(to top,    #2a2a24 0, #2a2a24 2px, transparent 2px) 5px  calc(100% - 5px) / 10px 10px no-repeat,
    linear-gradient(to left,   #2a2a24 0, #2a2a24 2px, transparent 2px) calc(100% - 5px) calc(100% - 5px) / 10px 10px no-repeat,
    linear-gradient(to top,    #2a2a24 0, #2a2a24 2px, transparent 2px) calc(100% - 5px) calc(100% - 5px) / 10px 10px no-repeat;
}

/* ── Panel screen (CRT glass) ─────────────────────────────── */
.panel-screen {
  flex: 1;
  min-height: 0;
  border-radius: 5px;
  overflow: hidden;
  position: relative;
  background: #050200;

  box-shadow:
    inset 0 2px 12px rgba(0,0,0,0.95),
    inset 0 0  4px  rgba(0,0,0,0.6),
    0 0 22px rgba(255,160,64,0.10),
    0 0  8px rgba(255,160,64,0.06);
}

/* Vignette overlay */
.panel-screen::before {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 5px;
  pointer-events: none;
  z-index: 2;
  background: radial-gradient(ellipse at 50% 50%, transparent 50%, rgba(0,0,0,0.50) 100%);
}

/* Scanline overlay */
.panel-screen::after {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 5px;
  pointer-events: none;
  z-index: 3;
  background: repeating-linear-gradient(
    to bottom,
    transparent  0px,
    transparent  2px,
    rgba(0,0,0,0.07) 2px,
    rgba(0,0,0,0.07) 3px
  );
}

iframe {
  width: 100%;
  height: 100%;
  border: none;
  display: block;
}

/* ── Panel label ─────────────────────────────────────────── */
.panel-id {
  font-size: 8px;
  color: #222220;
  text-align: center;
  letter-spacing: 0.40em;
  text-transform: uppercase;
  flex-shrink: 0;
  line-height: 1;
  user-select: none;
  padding-top: 1px;
}

/* ── Edit mode — label becomes drag handle ────────────────── */
body.edit-mode .panel-id {
  cursor: grab;
  color: #5a4a1a;
}
body.edit-mode .panel-id:active {
  cursor: grabbing;
}

/* Edit mode: panel glow */
body.edit-mode .panel {
  box-shadow:
    0 6px 28px rgba(0,0,0,0.95),
    0 2px 6px  rgba(0,0,0,0.8),
    0 0 0 1px rgba(204,112,32,0.25),
    inset 0 -2px 4px rgba(0,0,0,0.7),
    inset 0  1px 0   rgba(255,255,255,0.06);
}

/* GridStack resize handle styling */
.grid-stack-item > .ui-resizable-handle {
  opacity: 0;
  transition: opacity 0.2s;
}
body.edit-mode .grid-stack-item > .ui-resizable-handle {
  opacity: 1;
}
.ui-resizable-se {
  width: 14px !important;
  height: 14px !important;
  bottom: 2px !important;
  right: 2px !important;
  background: none !important;
  border-right: 2px solid #5a3a10 !important;
  border-bottom: 2px solid #5a3a10 !important;
  border-radius: 0 0 6px 0 !important;
  cursor: se-resize !important;
}

/* ── Placeholder during drag ─────────────────────────────── */
.grid-stack-placeholder > .placeholder-content {
  background: rgba(204,112,32,0.08) !important;
  border: 1px dashed #5a3a10 !important;
  border-radius: 9px !important;
}

/* ── Mobile overflow guard ───────────────────────────────── */
@media (max-width: 480px) {
  .cockpit { padding: 4px 4px 4px; gap: 4px; }
  .hdr-logo { font-size: 13px; letter-spacing: 0.2em; }
  .hdr-btn { display: none; }
  .hdr-btn.hdr-btn-edit { display: inline-block; }
}

</style>
</head>
<body>

<div class="cockpit">

  <!-- Header bar -->
  <div class="cockpit-header">
    <span class="hdr-logo">Flighttracker&nbsp;&nbsp;Cyberdeck</span>
    <div class="hdr-divider"></div>
    <div class="hdr-indicators">
      <div class="hdr-dot ok" id="dot-sys"  title="System"></div>
      <div class="hdr-dot ok" id="dot-data" title="Data feed"></div>
      <div class="hdr-dot ok" id="dot-net"  title="Network"></div>
      <span class="hdr-status" id="hdr-status">ALL SYSTEMS NOMINAL</span>
    </div>
    <!-- Toolbar -->
    <div class="hdr-toolbar">
      <button class="hdr-btn hdr-btn-edit" id="btn-edit"  title="Toggle edit mode">EDIT</button>
      <button class="hdr-btn" id="btn-reset" title="Reset to default layout">RESET</button>
    </div>
    <span class="hdr-time" id="hdr-clock">--:--:--</span>
  </div>

  <!-- Grid area -->
  <div class="grid-wrap" id="grid-wrap">
    <div class="grid-stack" id="dashboard-grid">

      <div class="grid-stack-item" gs-id="flight"   gs-x="0" gs-y="0" gs-w="7" gs-h="6">
        <div class="grid-stack-item-content">
          <div class="panel">
            <div class="panel-screen">
              <iframe data-page="main.html" title="Flight Display" loading="eager"></iframe>
            </div>
            <div class="panel-id">Flight&nbsp;Display</div>
          </div>
        </div>
      </div>

      <div class="grid-stack-item" gs-id="vitals"   gs-x="7" gs-y="0" gs-w="5" gs-h="6">
        <div class="grid-stack-item-content">
          <div class="panel">
            <div class="panel-screen">
              <iframe data-page="vitals.html" title="System Vitals" loading="eager"></iframe>
            </div>
            <div class="panel-id">Sys&nbsp;Vitals</div>
          </div>
        </div>
      </div>

      <div class="grid-stack-item" gs-id="spectrum" gs-x="0" gs-y="6" gs-w="4" gs-h="4">
        <div class="grid-stack-item-content">
          <div class="panel">
            <div class="panel-screen">
              <iframe data-page="spectrum.html" title="RF Spectrum" loading="lazy"></iframe>
            </div>
            <div class="panel-id">RF&nbsp;Spectrum</div>
          </div>
        </div>
      </div>

      <div class="grid-stack-item" gs-id="weather"  gs-x="4" gs-y="6" gs-w="5" gs-h="4">
        <div class="grid-stack-item-content">
          <div class="panel">
            <div class="panel-screen">
              <iframe data-page="weather.html" title="Weather" loading="lazy"></iframe>
            </div>
            <div class="panel-id">Weather</div>
          </div>
        </div>
      </div>

      <div class="grid-stack-item" gs-id="radar"    gs-x="9" gs-y="6" gs-w="3" gs-h="4">
        <div class="grid-stack-item-content">
          <div class="panel">
            <div class="panel-screen">
              <iframe data-page="radar.html" data-extra="sweep=on" title="Radar" loading="lazy"></iframe>
            </div>
            <div class="panel-id">Radar</div>
          </div>
        </div>
      </div>

    </div><!-- /.grid-stack -->
  </div><!-- /.grid-wrap -->

</div><!-- /.cockpit -->

<script src="https://cdn.jsdelivr.net/npm/gridstack@10/dist/gridstack-all.js"></script>
<script>
(function () {
  'use strict';

  /* ── Theme propagation ── */
  const theme = new URLSearchParams(location.search).get('theme') || 'color';
  document.querySelectorAll('iframe[data-page]').forEach(iframe => {
    const extra = iframe.dataset.extra ? '&' + iframe.dataset.extra : '';
    iframe.src = iframe.dataset.page + '?theme=' + theme + extra;
  });

  /* ── Header clock ── */
  function tick() {
    const now = new Date();
    document.getElementById('hdr-clock').textContent =
      String(now.getHours()).padStart(2,'0') + ':' +
      String(now.getMinutes()).padStart(2,'0') + ':' +
      String(now.getSeconds()).padStart(2,'0');
  }
  tick();
  setInterval(tick, 1000);

  /* ── Default layout (12-col, 10-row grid) ── */
  const DEFAULT_LAYOUT = [
    { id: 'flight',   x: 0, y: 0, w: 7, h: 6 },
    { id: 'vitals',   x: 7, y: 0, w: 5, h: 6 },
    { id: 'spectrum', x: 0, y: 6, w: 4, h: 4 },
    { id: 'weather',  x: 4, y: 6, w: 5, h: 4 },
    { id: 'radar',    x: 9, y: 6, w: 3, h: 4 },
  ];

  const STORAGE_KEY = 'cyberdeck-layout-v1';

  /* ── Compute cell height to fill the grid-wrap exactly ── */
  function computeCellHeight() {
    const wrap = document.getElementById('grid-wrap');
    const h    = wrap.offsetHeight;
    /* We want 10 rows to fill the wrap exactly.
       GridStack cellHeight = (totalHeight - margin*(rows+1)) / rows
       Default margin is 6px each side of a cell gap.
       We match our cockpit gap of 6px. */
    const rows   = 10;
    const margin = 6;
    return Math.max(20, Math.floor((h - margin * (rows + 1)) / rows));
  }

  /* ── Responsive column count ── */
  function colCount() {
    const w = window.innerWidth;
    if (w < 480)  return 1;
    if (w < 768)  return 2;
    if (w < 1024) return 6;
    return 12;
  }

  /* ── Init GridStack ── */
  const grid = GridStack.init({
    column:         colCount(),
    cellHeight:     computeCellHeight(),
    margin:         6,
    animate:        false,
    draggable:      { handle: '.panel-id' },
    resizable:      { handles: 'se' },
    float:          false,
    staticGrid:     true,   /* start locked; user unlocks with EDIT */
    columnOpts: {
      breakpoints: [
        { w: 480,  c: 1  },
        { w: 768,  c: 2  },
        { w: 1024, c: 6  },
      ],
      layout: 'moveScale',
    },
  }, '#dashboard-grid');

  /* ── Restore saved layout ── */
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
      const layout = JSON.parse(saved);
      /* Only restore if it has all 5 panels */
      if (Array.isArray(layout) && layout.length === DEFAULT_LAYOUT.length) {
        grid.load(layout);
      }
    }
  } catch (_) { /* ignore parse errors */ }

  /* ── Save layout on change ── */
  grid.on('change', () => {
    try {
      const layout = grid.save(false);  /* false = don't include HTML */
      localStorage.setItem(STORAGE_KEY, JSON.stringify(layout));
    } catch (_) {}
  });

  /* ── Edit mode toggle ── */
  let editMode = false;
  const btnEdit = document.getElementById('btn-edit');

  function setEditMode(on) {
    editMode = on;
    grid.setStatic(!on);
    btnEdit.classList.toggle('active', on);
    document.body.classList.toggle('edit-mode', on);
    document.getElementById('hdr-status').textContent =
      on ? 'EDIT MODE — DRAG LABEL TO MOVE' : 'ALL SYSTEMS NOMINAL';
  }

  btnEdit.addEventListener('click', () => setEditMode(!editMode));

  /* ── Reset layout ── */
  document.getElementById('btn-reset').addEventListener('click', () => {
    grid.load(DEFAULT_LAYOUT, true);  /* true = removes extra items */
    try { localStorage.removeItem(STORAGE_KEY); } catch (_) {}
  });

  /* ── Responsive resize ── */
  let resizeTimer;
  window.addEventListener('resize', () => {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(() => {
      const cols = colCount();
      const ch   = computeCellHeight();
      grid.column(cols);
      grid.cellHeight(ch);
    }, 150);
  });

})();
</script>

</body>
</html>
