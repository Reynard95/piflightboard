<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Flighttracker Cyberdeck</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/gridstack@10/dist/gridstack.min.css" rel="stylesheet">
<style>

/* ── Reset ────────────────────────────────────────────────── */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: #070705;
  font-family: 'Share Tech Mono', monospace;
  color: #2e2e28;
}

/* ── Cockpit shell ────────────────────────────────────────── */
.cockpit {
  width: 100vw;
  height: 100vh;
  display: flex;
  flex-direction: column;
  padding: 6px 8px 8px;
  gap: 6px;
  background:
    radial-gradient(ellipse 120% 80% at 50% -10%, #181814 0%, #070705 55%),
    repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(255,255,255,0.008) 39px, rgba(255,255,255,0.008) 40px),
    repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(255,255,255,0.008) 39px, rgba(255,255,255,0.008) 40px);
}

/* ── Cockpit header ───────────────────────────────────────── */
.cockpit-header {
  flex-shrink: 0;
  height: 28px;
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 0 6px;
  border-bottom: 1px solid #141410;
}

.hdr-logo {
  font-family: 'VT323', monospace;
  font-size: 17px;
  color: #7a7060;
  letter-spacing: 0.35em;
  text-transform: uppercase;
  white-space: nowrap;
}

.hdr-divider {
  width: 1px;
  height: 14px;
  background: #181814;
  flex-shrink: 0;
}

/* Live status area */
.hdr-indicators {
  display: flex;
  align-items: center;
  gap: 8px;
  flex: 1;
  min-width: 0;
}

.hdr-dot {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: #2a2820;
  flex-shrink: 0;
  transition: background 0.4s, box-shadow 0.4s;
}
.hdr-dot.ok   { background: #1a6a1a; box-shadow: 0 0 5px #1a8a1a; }
.hdr-dot.warn { background: #6a4a10; box-shadow: 0 0 5px #8a6010; }

/* Per-panel status pips */
.hdr-pips {
  display: flex;
  align-items: center;
  gap: 4px;
  flex-shrink: 0;
}
.hdr-pip {
  width: 3px; height: 3px;
  border-radius: 50%;
  background: #1c1c18;
  flex-shrink: 0;
  transition: background 0.4s;
}
.hdr-pip.live { background: #1a5a1a; }
.hdr-pip.warn { background: #5a3a08; }

.hdr-status {
  font-size: 9px;
  color: #7a7060;
  letter-spacing: 0.28em;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.hdr-time {
  font-family: 'VT323', monospace;
  font-size: 19px;
  color: #a09070;
  letter-spacing: 0.15em;
  white-space: nowrap;
  flex-shrink: 0;
}

/* ── Toolbar ──────────────────────────────────────────────── */
.hdr-toolbar {
  display: flex;
  align-items: center;
  gap: 6px;
  flex-shrink: 0;
}

.hdr-btn {
  font-family: 'Share Tech Mono', monospace;
  font-size: 8px;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: #a09070;
  background: linear-gradient(180deg, #1e1e1a 0%, #141412 100%);
  border: 1px solid #3a3428;
  border-radius: 3px;
  padding: 2px 6px;
  cursor: pointer;
  white-space: nowrap;
  transition: color 0.15s, border-color 0.15s;
  user-select: none;
}
.hdr-btn:hover {
  color: #c8b080;
  border-color: #5a4e38;
}
.hdr-btn.active {
  color: #CC7020;
  border-color: #5a3a10;
  background: linear-gradient(180deg, #1e1810 0%, #141008 100%);
}

/* ── Grid container ───────────────────────────────────────── */
.grid-wrap {
  flex: 1;
  min-height: 0;
  overflow: hidden;
  position: relative;
}

.grid-stack {
  background: transparent !important;
}

.grid-stack-item-content {
  overflow: visible !important;
  background: transparent !important;
}

/* ── Panel (bezel) ────────────────────────────────────────── */
.panel {
  display: flex;
  flex-direction: column;
  gap: 4px;
  width: 100%;
  height: 100%;
  padding: 9px 9px 5px;
  border-radius: 9px;
  position: relative;

  background: linear-gradient(180deg, #1e1e1a 0%, #141412 50%, #101010 100%);
  box-shadow:
    0 6px 28px rgba(0,0,0,0.95),
    0 2px 6px  rgba(0,0,0,0.8),
    0 0 0 1px rgba(255,255,255,0.035),
    inset 0 -2px 4px rgba(0,0,0,0.7),
    inset 0  1px 0   rgba(255,255,255,0.06);
}

/* Corner mount brackets */
.panel::before {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 9px;
  pointer-events: none;
  background:
    linear-gradient(to right,  #2a2a24 0, #2a2a24 2px, transparent 2px) 5px  5px  / 10px 10px no-repeat,
    linear-gradient(to bottom, #2a2a24 0, #2a2a24 2px, transparent 2px) 5px  5px  / 10px 10px no-repeat,
    linear-gradient(to left,   #2a2a24 0, #2a2a24 2px, transparent 2px) calc(100% - 5px) 5px / 10px 10px no-repeat,
    linear-gradient(to bottom, #2a2a24 0, #2a2a24 2px, transparent 2px) calc(100% - 5px) 5px / 10px 10px no-repeat,
    linear-gradient(to right,  #2a2a24 0, #2a2a24 2px, transparent 2px) 5px  calc(100% - 5px) / 10px 10px no-repeat,
    linear-gradient(to top,    #2a2a24 0, #2a2a24 2px, transparent 2px) 5px  calc(100% - 5px) / 10px 10px no-repeat,
    linear-gradient(to left,   #2a2a24 0, #2a2a24 2px, transparent 2px) calc(100% - 5px) calc(100% - 5px) / 10px 10px no-repeat,
    linear-gradient(to top,    #2a2a24 0, #2a2a24 2px, transparent 2px) calc(100% - 5px) calc(100% - 5px) / 10px 10px no-repeat;
}

/* ── Variant badge — always visible, top-right corner ──────── */
.panel-var-btn {
  position: absolute;
  top: 7px;
  right: 7px;
  z-index: 10;
  background: rgba(12,10,5,0.85);
  border: 1px solid #3a3018;
  border-radius: 3px;
  color: #907840;
  font-family: 'Share Tech Mono', monospace;
  font-size: 7px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  padding: 2px 6px;
  cursor: pointer;
  transition: color 0.15s, border-color 0.15s, background 0.15s;
  user-select: none;
}
.panel-var-btn.variant-active {
  color: #CC7020;
  border-color: #5a3a10;
  background: rgba(204,112,32,0.12);
}
body.edit-mode .panel-var-btn {
  color: #8a5820;
  border-color: #4a3010;
  background: rgba(12,10,5,0.92);
}
.panel-var-btn:hover,
body.edit-mode .panel-var-btn:hover {
  color: #FFA040;
  border-color: #8a5010;
  background: rgba(204,112,32,0.18);
}

/* ── Panel screen (CRT glass) ─────────────────────────────── */
.panel-screen {
  flex: 1;
  min-height: 0;
  border-radius: 5px;
  overflow: hidden;
  position: relative;
  background: #050200;
  box-shadow:
    inset 0 2px 12px rgba(0,0,0,0.95),
    inset 0 0  4px  rgba(0,0,0,0.6),
    0 0 22px rgba(255,160,64,0.10),
    0 0  8px rgba(255,160,64,0.06);
}

/* Vignette */
.panel-screen::before {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 5px;
  pointer-events: none;
  z-index: 2;
  background: radial-gradient(ellipse at 50% 50%, transparent 50%, rgba(0,0,0,0.50) 100%);
}

/* Scanlines */
.panel-screen::after {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 5px;
  pointer-events: none;
  z-index: 3;
  background: repeating-linear-gradient(
    to bottom,
    transparent  0px,
    transparent  2px,
    rgba(0,0,0,0.07) 2px,
    rgba(0,0,0,0.07) 3px
  );
}

iframe {
  width: 100%;
  height: 100%;
  border: none;
  display: block;
}

/* ── Panel label row ─────────────────────────────────────── */
.panel-footer {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 5px;
  flex-shrink: 0;
  padding-top: 1px;
  line-height: 1;
}

.panel-id {
  font-size: 8px;
  color: #6a6258;
  text-align: center;
  letter-spacing: 0.40em;
  text-transform: uppercase;
  user-select: none;
}

.panel-live-pip {
  width: 3px; height: 3px;
  border-radius: 50%;
  background: #1c1c18;
  flex-shrink: 0;
  transition: background 0.4s;
}
.panel-live-pip.live { background: #1a5a1a; }
.panel-live-pip.warn { background: #5a3a08; }

/* ── Edit mode ───────────────────────────────────────────── */
body.edit-mode .panel-id {
  cursor: grab;
  color: #5a4a1a;
}
body.edit-mode .panel-id:active {
  cursor: grabbing;
}

body.edit-mode .panel {
  box-shadow:
    0 6px 28px rgba(0,0,0,0.95),
    0 2px 6px  rgba(0,0,0,0.8),
    0 0 0 1px rgba(204,112,32,0.25),
    inset 0 -2px 4px rgba(0,0,0,0.7),
    inset 0  1px 0   rgba(255,255,255,0.06);
}

/* GridStack resize handle */
.grid-stack-item > .ui-resizable-handle {
  opacity: 0;
  transition: opacity 0.2s;
}
body.edit-mode .grid-stack-item > .ui-resizable-handle {
  opacity: 1;
}
.ui-resizable-se {
  width: 14px !important;
  height: 14px !important;
  bottom: 2px !important;
  right: 2px !important;
  background: none !important;
  border-right: 2px solid #5a3a10 !important;
  border-bottom: 2px solid #5a3a10 !important;
  border-radius: 0 0 6px 0 !important;
  cursor: se-resize !important;
}

/* ── Drag placeholder ────────────────────────────────────── */
.grid-stack-placeholder > .placeholder-content {
  background: rgba(204,112,32,0.08) !important;
  border: 1px dashed #5a3a10 !important;
  border-radius: 9px !important;
}

/* ══════════════════════════════════════════════════════════
   PRESET MODAL
   ══════════════════════════════════════════════════════════ */

.preset-overlay {
  position: fixed;
  inset: 0;
  z-index: 100;
  background: rgba(0,0,0,0.72);
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.18s;
}
.preset-overlay.open {
  opacity: 1;
  pointer-events: all;
}

.preset-modal {
  background: linear-gradient(180deg, #1a1a16 0%, #111110 100%);
  border: 1px solid #2c2418;
  border-radius: 10px;
  width: min(420px, 94vw);
  box-shadow:
    0 24px 64px rgba(0,0,0,0.97),
    0 0 0 1px rgba(255,255,255,0.03),
    inset 0 1px 0 rgba(255,255,255,0.04);
  overflow: hidden;
}

.preset-modal-hdr {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 13px 16px 11px;
  border-bottom: 1px solid #1c1c14;
}

.preset-modal-title {
  font-family: 'VT323', monospace;
  font-size: 20px;
  color: #CC7020;
  letter-spacing: 0.3em;
}

.preset-modal-close {
  background: none;
  border: none;
  color: #907848;
  cursor: pointer;
  font-size: 12px;
  font-family: 'Share Tech Mono', monospace;
  padding: 3px 6px;
  border-radius: 3px;
  transition: color 0.15s;
  line-height: 1;
}
.preset-modal-close:hover { color: #CC7020; }

.preset-list {
  padding: 6px 0;
  max-height: 380px;
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: #2a2010 transparent;
}
.preset-list::-webkit-scrollbar { width: 4px; }
.preset-list::-webkit-scrollbar-track { background: transparent; }
.preset-list::-webkit-scrollbar-thumb { background: #2a2010; border-radius: 2px; }

.preset-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 16px;
  cursor: pointer;
  transition: background 0.12s;
  border: none;
  background: none;
  width: 100%;
  text-align: left;
}
.preset-row:hover    { background: rgba(204,112,32,0.07); }
.preset-row.current  { background: rgba(204,112,32,0.12); }

.preset-row-marker {
  width: 4px; height: 4px;
  border-radius: 50%;
  background: transparent;
  flex-shrink: 0;
  transition: background 0.2s, box-shadow 0.2s;
}
.preset-row.current .preset-row-marker {
  background: #CC7020;
  box-shadow: 0 0 5px #CC7020;
}

/* Mini thumbnail */
.preset-thumb {
  width: 54px;
  height: 36px;
  border: 1px solid #201a0c;
  border-radius: 3px;
  background: #0d0d0a;
  position: relative;
  flex-shrink: 0;
  overflow: hidden;
}
.pt-block {
  position: absolute;
  border: 1px solid #3a2e10;
  border-radius: 1px;
  background: #1a1810;
}
.preset-row.current .preset-thumb { border-color: #5a3a10; }
.preset-row.current .pt-block     { border-color: #8a5010; background: #221a08; }

.preset-row-name {
  flex: 1;
  font-family: 'Share Tech Mono', monospace;
  font-size: 10px;
  color: #a08858;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  min-width: 0;
}
.preset-row.current .preset-row-name { color: #CC7020; }

.preset-row-tag {
  font-size: 7px;
  color: #7a6840;
  letter-spacing: 0.18em;
  border: 1px solid #201a0c;
  border-radius: 2px;
  padding: 1px 5px;
  text-transform: uppercase;
  flex-shrink: 0;
}

.preset-row-del {
  background: none;
  border: none;
  color: #7a6040;
  cursor: pointer;
  font-size: 8px;
  letter-spacing: 0.12em;
  font-family: 'Share Tech Mono', monospace;
  padding: 2px 5px;
  border-radius: 2px;
  transition: color 0.15s, background 0.15s;
  flex-shrink: 0;
}
.preset-row-del:hover { color: #cc3010; background: rgba(200,48,16,0.12); }

.preset-modal-sep {
  height: 1px;
  background: #181810;
  margin: 2px 0;
}

.preset-modal-footer {
  padding: 11px 16px;
  display: flex;
  justify-content: center;
}

/* ── Mobile ──────────────────────────────────────────────── */
@media (max-width: 480px) {
  .cockpit { padding: 4px; gap: 4px; }
  .hdr-logo { font-size: 13px; letter-spacing: 0.2em; }
  .hdr-btn { display: none; }
  .hdr-btn.hdr-btn-edit { display: inline-block; }
  .preset-thumb { display: none; }
}

/* ══════════════════════════════════════════════════════════
   CONFIG MODAL
   ══════════════════════════════════════════════════════════ */

.config-overlay {
  position: fixed;
  inset: 0;
  z-index: 100;
  background: rgba(0,0,0,0.72);
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.18s;
}
.config-overlay.open {
  opacity: 1;
  pointer-events: all;
}

.config-modal {
  background: linear-gradient(180deg, #1a1a16 0%, #111110 100%);
  border: 1px solid #2c2418;
  border-radius: 10px;
  width: min(400px, 94vw);
  box-shadow:
    0 24px 64px rgba(0,0,0,0.97),
    0 0 0 1px rgba(255,255,255,0.03),
    inset 0 1px 0 rgba(255,255,255,0.04);
  overflow: hidden;
}

.config-modal-hdr {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 13px 16px 11px;
  border-bottom: 1px solid #1c1c14;
}

.config-modal-title {
  font-family: 'VT323', monospace;
  font-size: 20px;
  color: #CC7020;
  letter-spacing: 0.3em;
}

.config-body {
  padding: 4px 0;
}

.config-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 16px;
  border-bottom: 1px solid #141410;
}
.config-row:last-child { border-bottom: none; }

.config-lbl {
  font-family: 'Share Tech Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.28em;
  color: #b09060;
  text-transform: uppercase;
  width: 110px;
  flex-shrink: 0;
}

.config-opts {
  display: flex;
  gap: 4px;
  flex-wrap: wrap;
}

.cfg-opt {
  font-family: 'Share Tech Mono', monospace;
  font-size: 8px;
  letter-spacing: 0.20em;
  text-transform: uppercase;
  color: #a09070;
  background: linear-gradient(180deg, #1e1e1a 0%, #141412 100%);
  border: 1px solid #3a3018;
  border-radius: 3px;
  padding: 3px 8px;
  cursor: pointer;
  transition: color 0.12s, border-color 0.12s, background 0.12s;
  user-select: none;
}
.cfg-opt:hover { color: #8a6020; border-color: #4a3010; }
.cfg-opt.active {
  color: #CC7020;
  border-color: #7a4a10;
  background: linear-gradient(180deg, #221808 0%, #181005 100%);
  box-shadow: 0 0 6px rgba(204,112,32,0.2);
}

.config-footer {
  padding: 10px 16px;
  border-top: 1px solid #1c1c14;
  display: flex;
  justify-content: flex-end;
}

</style>
</head>
<body>

<!-- ── Preset picker overlay ──────────────────────────────── -->
<div class="preset-overlay" id="preset-overlay" aria-hidden="true">
  <div class="preset-modal" role="dialog" aria-label="Layout presets">
    <div class="preset-modal-hdr">
      <span class="preset-modal-title">LAYOUT PRESETS</span>
      <button class="preset-modal-close" id="btn-preset-close" aria-label="Close">✕</button>
    </div>
    <div class="preset-list" id="preset-list"></div>
    <div class="preset-modal-sep"></div>
    <div class="preset-modal-footer">
      <button class="hdr-btn" id="btn-save-preset">+ SAVE CURRENT AS PRESET</button>
    </div>
  </div>
</div>

<!-- ── Config overlay ─────────────────────────────────────── -->
<div class="config-overlay" id="config-overlay" aria-hidden="true">
  <div class="config-modal" role="dialog" aria-label="Panel configuration">
    <div class="config-modal-hdr">
      <span class="config-modal-title">PANEL CONFIG</span>
      <button class="preset-modal-close" id="btn-config-close" aria-label="Close">✕</button>
    </div>
    <div class="config-body">

      <div class="config-row">
        <span class="config-lbl">Refresh</span>
        <div class="config-opts" id="cfg-refresh">
          <button class="cfg-opt" data-val="5">5 s</button>
          <button class="cfg-opt" data-val="10">10 s</button>
          <button class="cfg-opt" data-val="15">15 s</button>
          <button class="cfg-opt" data-val="30">30 s</button>
        </div>
      </div>

      <div class="config-row">
        <span class="config-lbl">Radar Range</span>
        <div class="config-opts" id="cfg-range">
          <button class="cfg-opt" data-val="100">100 km</button>
          <button class="cfg-opt" data-val="150">150 km</button>
          <button class="cfg-opt" data-val="200">200 km</button>
          <button class="cfg-opt" data-val="250">250 km</button>
        </div>
      </div>

      <div class="config-row">
        <span class="config-lbl">Radar View</span>
        <div class="config-opts" id="cfg-radarview">
          <button class="cfg-opt" data-val="tile">Tile</button>
          <button class="cfg-opt" data-val="list">List</button>
        </div>
      </div>

      <div class="config-row">
        <span class="config-lbl">Filter Radius</span>
        <div class="config-opts" id="cfg-radius">
          <button class="cfg-opt" data-val="50">50 km</button>
          <button class="cfg-opt" data-val="100">100 km</button>
          <button class="cfg-opt" data-val="150">150 km</button>
          <button class="cfg-opt" data-val="200">200 km</button>
          <button class="cfg-opt" data-val="300">300 km</button>
        </div>
      </div>

      <div class="config-row">
        <span class="config-lbl">Closest Only</span>
        <div class="config-opts" id="cfg-closest">
          <button class="cfg-opt" data-val="false">Off</button>
          <button class="cfg-opt" data-val="true">On</button>
        </div>
      </div>

      <div class="config-row">
        <span class="config-lbl">Radar Sweep</span>
        <div class="config-opts" id="cfg-sweep">
          <button class="cfg-opt" data-val="on">On</button>
          <button class="cfg-opt" data-val="off">Off</button>
        </div>
      </div>

      <div class="config-row">
        <span class="config-lbl">Units</span>
        <div class="config-opts" id="cfg-units">
          <button class="cfg-opt" data-val="nm">NM / FT</button>
          <button class="cfg-opt" data-val="metric">Metric</button>
        </div>
      </div>

    </div>
    <div class="config-footer">
      <button class="hdr-btn" id="btn-config-apply">APPLY &amp; RELOAD PANELS</button>
    </div>
  </div>
</div>

<!-- ── Main cockpit shell ─────────────────────────────────── -->
<div class="cockpit">

  <!-- Header bar -->
  <div class="cockpit-header">
    <span class="hdr-logo">Flighttracker&nbsp;&nbsp;Cyberdeck</span>
    <div class="hdr-divider"></div>
    <div class="hdr-indicators">

<script src="https://cdn.jsdelivr.net/npm/gridstack@10/dist/gridstack-all.js"></script>
<script>
(function () {
  'use strict';

  /* ══════════════════════════════════════════════════════════
     PANEL CONFIGURATION
     ══════════════════════════════════════════════════════════ */

  const PANEL_PAGES = {
    flight:   'main.html',
    vitals:   'vitals.html',
    spectrum: 'spectrum.html',
    weather:  'weather.html',
    radar:    'radar.html',
  };

  const PANEL_VARIANTS = {
    flight:   ['normal', 'focus'],
    radar:    ['normal', 'square'],
    vitals:   ['normal'],
    spectrum: ['normal'],
    weather:  ['normal'],
  };

  const ALL_PANELS = Object.keys(PANEL_PAGES);

  /* ── Theme ─────────────────────────────────────────────── */
  const theme = new URLSearchParams(location.search).get('theme') || 'color';

  /* ══════════════════════════════════════════════════════════
     PANEL CONFIG  (persisted in localStorage)
     ══════════════════════════════════════════════════════════ */

  const CONFIG_KEY     = 'cyberdeck-config-v1';
  const DEFAULT_CONFIG = { refresh: 10, radius: 150, closest: false, sweep: 'on', radarRange: 250, radarView: 'tile', units: 'nm' };

  let panelConfig = { ...DEFAULT_CONFIG };
  try {
    const sc = JSON.parse(localStorage.getItem(CONFIG_KEY));
    if (sc && typeof sc === 'object') panelConfig = { ...DEFAULT_CONFIG, ...sc };
  } catch (_) {}

  function saveConfig() {
    try { localStorage.setItem(CONFIG_KEY, JSON.stringify(panelConfig)); } catch (_) {}
  }

  /* ══════════════════════════════════════════════════════════
     IFRAME SRC BUILDER
     ══════════════════════════════════════════════════════════ */

  function buildSrc(panelId, variant) {
    const params = new URLSearchParams({ theme, embedded: '1' });

    /* Global config params */
    if (panelConfig.refresh !== DEFAULT_CONFIG.refresh)
      params.set('refresh', panelConfig.refresh);

    if (panelId === 'radar') {
      params.set('sweep', panelConfig.sweep);
      params.set('range', panelConfig.radarRange);
      if (panelConfig.radarView !== DEFAULT_CONFIG.radarView)
        params.set('view', panelConfig.radarView);
      if (panelConfig.units !== DEFAULT_CONFIG.units)
        params.set('units', 'metric');
      if (panelConfig.radius !== DEFAULT_CONFIG.radius)
        params.set('radius', panelConfig.radius);
      if (panelConfig.closest) params.set('closest', '');
      if (variant === 'square') params.set('square', '');
    }

    if (panelId === 'flight') {
      if (panelConfig.radius !== DEFAULT_CONFIG.radius)
        params.set('radius', panelConfig.radius);
      if (panelConfig.closest) params.set('closest', '');
      if (variant === 'focus') params.set('focus', '');
    }

    /* Remove empty-value keys (e.g. ?square= → ?square) */
    const qs = params.toString().replace(/=(?=&|$)/g, '');
    return PANEL_PAGES[panelId] + '?' + qs;
  }

  /* ══════════════════════════════════════════════════════════
     VARIANT STATE
     ══════════════════════════════════════════════════════════ */

  const panelVariants = {};
  ALL_PANELS.forEach(id => { panelVariants[id] = 'normal'; });

  function applyVariants() {
    ALL_PANELS.forEach(id => {
      const iframe = document.getElementById('iframe-' + id);
      if (!iframe) return;
      const src = buildSrc(id, panelVariants[id]);
      if (iframe.getAttribute('src') !== src) iframe.src = src;
    });
  }

  function updateVarBtnLabels() {
    document.querySelectorAll('.panel-var-btn').forEach(btn => {
      const id = btn.dataset.panel;
      if (!id) return;
      const v = panelVariants[id] || 'normal';
      btn.textContent = v.toUpperCase();
      btn.classList.toggle('variant-active', v !== 'normal');
    });
  }

  function cycleVariant(panelId) {
    const variants = PANEL_VARIANTS[panelId] || ['normal'];
    const cur = panelVariants[panelId] || 'normal';
    panelVariants[panelId] = variants[(variants.indexOf(cur) + 1) % variants.length];
    applyVariants();
    updateVarBtnLabels();
    activePresetId = null;
    renderPresetList();
    saveCurrentLayout();
  }

  document.querySelectorAll('.panel-var-btn').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      cycleVariant(btn.dataset.panel);
    });
  });

  /* ══════════════════════════════════════════════════════════
     STORAGE KEYS
     ══════════════════════════════════════════════════════════ */

  const LAYOUT_KEY  = 'cyberdeck-layout-v5';
  const PRESETS_KEY = 'cyberdeck-presets-v2';

  /* ══════════════════════════════════════════════════════════
     BUILT-IN PRESETS
     ══════════════════════════════════════════════════════════ */

  const BUILTIN_PRESETS = [
    {
      id:      'standard',
      name:    'STANDARD',
      builtin: true,
      thumb: [
        { l:  0,  t: 0,  w: 58, h: 58 },
        { l: 60,  t: 0,  w: 40, h: 58 },
        { l:  0,  t: 61, w: 41, h: 39 },
        { l: 43,  t: 61, w: 33, h: 39 },
        { l: 78,  t: 61, w: 22, h: 39 },
      ],
      items: [
        { id: 'flight',   x: 0, y: 0, w: 7, h: 7,  variant: 'normal' },
        { id: 'vitals',   x: 7, y: 0, w: 5, h: 7,  variant: 'normal' },
        { id: 'spectrum', x: 0, y: 7, w: 5, h: 5,  variant: 'normal' },
        { id: 'weather',  x: 5, y: 7, w: 4, h: 5,  variant: 'normal' },
        { id: 'radar',    x: 9, y: 7, w: 3, h: 5,  variant: 'normal' },
      ],
    },
    {
      id:      'cyberdeck',
      name:    'CYBERDECK',
      builtin: true,
      /* Matches screenshot: flight left, full-height radar list right,
         spectrum+vitals middle strip, thin weather bar at bottom     */
      thumb: [
        { l:  0,  t:  0, w: 66, h: 49 },
        { l: 68,  t:  0, w: 32, h: 100},
        { l:  0,  t: 51, w: 33, h: 25 },
        { l: 35,  t: 51, w: 31, h: 25 },
        { l:  0,  t: 77, w: 66, h: 23 },
      ],
      items: [
        { id: 'flight',   x: 0, y: 0, w: 8, h: 6,  variant: 'normal' },
        { id: 'spectrum', x: 0, y: 6, w: 4, h: 3,  variant: 'normal' },
        { id: 'vitals',   x: 4, y: 6, w: 4, h: 3,  variant: 'normal' },
        { id: 'weather',  x: 0, y: 9, w: 8, h: 3,  variant: 'normal' },
        { id: 'radar',    x: 8, y: 0, w: 4, h: 12, variant: 'normal' },
      ],
    },
    {
      id:      'focus',
      name:    'FOCUS',
      builtin: true,
      thumb: [
        { l:  0,  t:  0, w: 66, h: 75 },
        { l: 68,  t:  0, w: 32, h: 75 },
        { l:  0,  t: 77, w: 33, h: 23 },
        { l: 35,  t: 77, w: 31, h: 23 },
        { l: 68,  t: 77, w: 32, h: 23 },
      ],
      items: [
        { id: 'flight',   x: 0, y: 0, w: 8, h: 9,  variant: 'focus'  },
        { id: 'radar',    x: 8, y: 0, w: 4, h: 9,  variant: 'square' },
        { id: 'vitals',   x: 0, y: 9, w: 4, h: 3,  variant: 'normal' },
        { id: 'weather',  x: 4, y: 9, w: 4, h: 3,  variant: 'normal' },
        { id: 'spectrum', x: 8, y: 9, w: 4, h: 3,  variant: 'normal' },
      ],
    },
    {
      id:      'command',
      name:    'COMMAND',
      builtin: true,
      /* Radar fills left 8 cols full height (normal+list) | right column:
         flight-focus | weather | spectrum+vitals split               */
      thumb: [
        { l:  0,  t:  0, w: 66, h: 100},
        { l: 68,  t:  0, w: 32, h: 33 },
        { l: 68,  t: 35, w: 32, h: 41 },
        { l: 68,  t: 78, w: 15, h: 22 },
        { l: 85,  t: 78, w: 15, h: 22 },
      ],
      items: [
        { id: 'radar',    x: 0,  y: 0, w: 8, h: 12, variant: 'normal' },
        { id: 'flight',   x: 8,  y: 0, w: 4, h: 5,  variant: 'focus'  },
        { id: 'weather',  x: 8,  y: 5, w: 4, h: 4,  variant: 'normal' },
        { id: 'spectrum', x: 8,  y: 9, w: 2, h: 3,  variant: 'normal' },
        { id: 'vitals',   x: 10, y: 9, w: 2, h: 3,  variant: 'normal' },
      ],
    },
  ];

  let activePresetId = null;

  /* ══════════════════════════════════════════════════════════
     CUSTOM PRESET STORAGE
     ══════════════════════════════════════════════════════════ */

  function getCustomPresets() {
    try { return JSON.parse(localStorage.getItem(PRESETS_KEY)) || []; }
    catch (_) { return []; }
  }

  function saveCustomPresets(arr) {
    try { localStorage.setItem(PRESETS_KEY, JSON.stringify(arr)); } catch (_) {}
  }

  function captureItems() {
    return grid.save(false).map(p => ({
      id:      p.id,
      x:       p.x,  y: p.y,
      w:       p.w,  h: p.h,
      variant: panelVariants[p.id] || 'normal',
    }));
  }

  function saveCurrentLayout() {
    try { localStorage.setItem(LAYOUT_KEY, JSON.stringify(captureItems())); }
    catch (_) {}
  }

  /* ══════════════════════════════════════════════════════════
     APPLY A PRESET
     ══════════════════════════════════════════════════════════ */

  let applyingPreset = false;

  function applyPreset(preset) {
    applyingPreset = true;

    preset.items.forEach(item => {
      panelVariants[item.id] = item.variant || 'normal';
    });

    const gsItems = preset.items.map(({ variant, ...rest }) => rest);
    grid.load(gsItems, true);

    applyVariants();
    updateVarBtnLabels();

    activePresetId = preset.id;
    applyingPreset = false;

    saveCurrentLayout();
    renderPresetList();
  }

  /* ══════════════════════════════════════════════════════════
     GRIDSTACK INIT
     ══════════════════════════════════════════════════════════ */

  function computeCellHeight() {
    const rows = 12, margin = 6;
    // Use window.innerHeight minus fixed cockpit overhead so this works even
    // before the browser has completed first layout (offsetHeight may be 0).
    // Overhead: header(28) + cockpit padding-top(6) + padding-bottom(8) + flex-gap(6) = 48px
    const available = window.innerHeight - 48;
    return Math.max(20, Math.floor((available - margin * (rows + 1)) / rows));
  }

  function colCount() {
    const w = window.innerWidth;
    if (w < 480)  return 1;
    if (w < 768)  return 2;
    if (w < 1024) return 6;
    return 12;
  }

  const grid = GridStack.init({
    column:     colCount(),
    cellHeight: computeCellHeight(),
    margin:     6,
    animate:    false,
    draggable:  { handle: '.panel-id' },
    resizable:  { handles: 'se' },
    float:      false,
    staticGrid: true,
    columnOpts: {
      breakpoints: [
        { w: 480,  c: 1 },
        { w: 768,  c: 2 },
        { w: 1024, c: 6 },
      ],
      layout: 'moveScale',
    },
  }, '#dashboard-grid');

  /* ── Restore saved layout ──────────────────────────────── */
  let initDone = false;
  try {
    const raw = localStorage.getItem(LAYOUT_KEY);
    if (raw) {
      const saved = JSON.parse(raw);
      if (Array.isArray(saved) && saved.length === ALL_PANELS.length) {
        saved.forEach(item => {
          if (item.variant) panelVariants[item.id] = item.variant;
        });
        applyingPreset = true;
        grid.load(saved.map(({ variant, ...rest }) => rest));
        applyingPreset = false;
      }
    } else {
      activePresetId = 'standard';
    }
  } catch (_) {}
  initDone = true;

  applyVariants();
  updateVarBtnLabels();

  /* Persist on user drag/resize */
  grid.on('change', () => {
    if (!initDone || applyingPreset) return;
    activePresetId = null;
    renderPresetList();
    saveCurrentLayout();
  });

  /* Correct cell height after first paint — guards against offsetHeight=0 at init */
  requestAnimationFrame(() => requestAnimationFrame(() => {
    grid.cellHeight(computeCellHeight());
  }));

  /* Responsive resize */
  let resizeTimer;
  window.addEventListener('resize', () => {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(() => {
      grid.column(colCount());
      grid.cellHeight(computeCellHeight());
    }, 150);
  });

  /* ══════════════════════════════════════════════════════════
     CONFIG MODAL
     ══════════════════════════════════════════════════════════ */

  const configOverlay = document.getElementById('config-overlay');

  function openConfig() {
    renderConfigUI();
    configOverlay.classList.add('open');
    configOverlay.removeAttribute('aria-hidden');
  }
  function closeConfig() {
    configOverlay.classList.remove('open');
    configOverlay.setAttribute('aria-hidden', 'true');
  }

  document.getElementById('btn-config').addEventListener('click', openConfig);
  document.getElementById('btn-config-close').addEventListener('click', closeConfig);
  configOverlay.addEventListener('click', e => { if (e.target === configOverlay) closeConfig(); });

  function renderConfigUI() {
    document.querySelectorAll('#cfg-refresh .cfg-opt').forEach(b =>
      b.classList.toggle('active', +b.dataset.val === panelConfig.refresh));
    document.querySelectorAll('#cfg-range .cfg-opt').forEach(b =>
      b.classList.toggle('active', +b.dataset.val === panelConfig.radarRange));
    document.querySelectorAll('#cfg-radarview .cfg-opt').forEach(b =>
      b.classList.toggle('active', b.dataset.val === panelConfig.radarView));
    document.querySelectorAll('#cfg-radius .cfg-opt').forEach(b =>
      b.classList.toggle('active', +b.dataset.val === panelConfig.radius));
    document.querySelectorAll('#cfg-closest .cfg-opt').forEach(b =>
      b.classList.toggle('active', b.dataset.val === String(panelConfig.closest)));
    document.querySelectorAll('#cfg-sweep .cfg-opt').forEach(b =>
      b.classList.toggle('active', b.dataset.val === panelConfig.sweep));
    document.querySelectorAll('#cfg-units .cfg-opt').forEach(b =>
      b.classList.toggle('active', b.dataset.val === panelConfig.units));
  }

  document.querySelectorAll('#cfg-refresh .cfg-opt').forEach(b =>
    b.addEventListener('click', () => { panelConfig.refresh = +b.dataset.val; renderConfigUI(); }));
  document.querySelectorAll('#cfg-range .cfg-opt').forEach(b =>
    b.addEventListener('click', () => { panelConfig.radarRange = +b.dataset.val; renderConfigUI(); }));
  document.querySelectorAll('#cfg-radarview .cfg-opt').forEach(b =>
    b.addEventListener('click', () => { panelConfig.radarView = b.dataset.val; renderConfigUI(); }));
  document.querySelectorAll('#cfg-radius .cfg-opt').forEach(b =>
    b.addEventListener('click', () => { panelConfig.radius = +b.dataset.val; renderConfigUI(); }));
  document.querySelectorAll('#cfg-closest .cfg-opt').forEach(b =>
    b.addEventListener('click', () => { panelConfig.closest = b.dataset.val === 'true'; renderConfigUI(); }));
  document.querySelectorAll('#cfg-sweep .cfg-opt').forEach(b =>
    b.addEventListener('click', () => { panelConfig.sweep = b.dataset.val; renderConfigUI(); }));
  document.querySelectorAll('#cfg-units .cfg-opt').forEach(b =>
    b.addEventListener('click', () => { panelConfig.units = b.dataset.val; renderConfigUI(); }));

  document.getElementById('btn-config-apply').addEventListener('click', () => {
    saveConfig();
    applyVariants(); /* reload all iframes with new URL params */
    closeConfig();
  });

  /* ══════════════════════════════════════════════════════════
     HEADER CLOCK
     ══════════════════════════════════════════════════════════ */

  function tick() {
    const d = new Date();
    document.getElementById('hdr-clock').textContent =
      String(d.getHours()).padStart(2, '0') + ':' +
      String(d.getMinutes()).padStart(2, '0') + ':' +
      String(d.getSeconds()).padStart(2, '0');
  }
  tick();
  setInterval(tick, 1000);

  /* ══════════════════════════════════════════════════════════
     PANEL LIVE STATUS  (postMessage from child iframes)
     ══════════════════════════════════════════════════════════ */

  const panelStatus = {};
  const STATUS_TTL  = 15000;

  const pipsContainer = document.getElementById('hdr-pips');
  ALL_PANELS.forEach(id => {
    const pip = document.createElement('div');
    pip.className = 'hdr-pip';
    pip.dataset.panel = id;
    pip.title = id;
    pipsContainer.appendChild(pip);
  });

  window.addEventListener('message', e => {
    if (e.data?.type === 'panel-status' && e.data.panel) {
      panelStatus[e.data.panel] = Date.now();
      updateLiveIndicators();
      return;
    }
    if (e.data?.type === 'radar-select') {
      const flightWin = document.getElementById('iframe-flight')?.contentWindow;
      if (flightWin) {
        try { flightWin.postMessage({ type: 'select-aircraft', hex: e.data.hex }, '*'); } catch (_) {}
      }
    }
  });

  function updateLiveIndicators() {
    const now  = Date.now();
    const live = ALL_PANELS.filter(id => panelStatus[id] && (now - panelStatus[id]) < STATUS_TTL);
    const dot  = document.getElementById('hdr-dot');
    const lbl  = document.getElementById('hdr-status');

    dot.classList.remove('ok', 'warn');
    if (live.length === ALL_PANELS.length) {
      dot.classList.add('ok');
    } else if (live.length > 0) {
      dot.classList.add('warn');
    }

    if (!editMode) {
      if (live.length === ALL_PANELS.length) {
        lbl.textContent = 'ALL PANELS LIVE';
      } else if (live.length > 0) {
        lbl.textContent = live.length + '/' + ALL_PANELS.length + ' PANELS LIVE';
      } else {
        lbl.textContent = 'WAITING FOR DATA';
      }
    }

    pipsContainer.querySelectorAll('.hdr-pip').forEach(pip => {
      const id  = pip.dataset.panel;
      const age = panelStatus[id] ? now - panelStatus[id] : Infinity;
      pip.classList.toggle('live', age < STATUS_TTL);
      pip.classList.toggle('warn', age >= STATUS_TTL && !!panelStatus[id]);
    });

    ALL_PANELS.forEach(id => {
      const pip = document.getElementById('pip-' + id);
      if (!pip) return;
      const age = panelStatus[id] ? now - panelStatus[id] : Infinity;
      pip.classList.toggle('live', age < STATUS_TTL);
      pip.classList.toggle('warn', age >= STATUS_TTL && !!panelStatus[id]);
    });
  }
  setInterval(updateLiveIndicators, 5000);

  /* ══════════════════════════════════════════════════════════
     EDIT MODE
     ══════════════════════════════════════════════════════════ */

  let editMode = false;
  const btnEdit = document.getElementById('btn-edit');

  function setEditMode(on) {
    editMode = on;
    grid.setStatic(!on);
    btnEdit.classList.toggle('active', on);
    document.body.classList.toggle('edit-mode', on);
    if (on) {
      document.getElementById('hdr-status').textContent = 'EDIT MODE — DRAG LABEL TO MOVE';
    } else {
      updateLiveIndicators();
    }
  }
  btnEdit.addEventListener('click', () => setEditMode(!editMode));

  document.getElementById('btn-reset').addEventListener('click', () => {
    applyPreset(BUILTIN_PRESETS[0]);
    try { localStorage.removeItem(LAYOUT_KEY); } catch (_) {}
  });

  /* ══════════════════════════════════════════════════════════
     PRESET OVERLAY
     ══════════════════════════════════════════════════════════ */

  const overlay    = document.getElementById('preset-overlay');
  const btnPresets = document.getElementById('btn-presets');

  function openPresets() {
    renderPresetList();
    overlay.classList.add('open');
    overlay.setAttribute('aria-hidden', 'false');
    btnPresets.classList.add('active');
  }
  function closePresets() {
    overlay.classList.remove('open');
    overlay.setAttribute('aria-hidden', 'true');
    btnPresets.classList.remove('active');
  }

  btnPresets.addEventListener('click', () =>
    overlay.classList.contains('open') ? closePresets() : openPresets()
  );
  document.getElementById('btn-preset-close').addEventListener('click', closePresets);
  overlay.addEventListener('click', e => { if (e.target === overlay) closePresets(); });
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape' && overlay.classList.contains('open')) closePresets();
    if (e.key === 'Escape' && document.getElementById('config-overlay').classList.contains('open')) closeConfig();
  });

  function buildThumb(blocks) {
    if (!blocks) return '<div class="preset-thumb"></div>';
    const inner = blocks.map(b =>
      '<div class="pt-block" style="left:' + b.l + '%;top:' + b.t + '%;width:' + b.w + '%;height:' + b.h + '%"></div>'
    ).join('');
    return '<div class="preset-thumb">' + inner + '</div>';
  }

  function renderPresetList() {
    const list   = document.getElementById('preset-list');
    const custom = getCustomPresets();
    const all    = [...BUILTIN_PRESETS, ...custom];

    list.innerHTML = all.map(preset => {
      const cur    = preset.id === activePresetId;
      const tag    = preset.builtin ? 'BUILT-IN' : 'CUSTOM';
      const delBtn = preset.builtin
        ? ''
        : '<button class="preset-row-del" data-id="' + esc(preset.id) + '" title="Delete">DEL</button>';
      return '<button class="preset-row' + (cur ? ' current' : '') + '" data-id="' + esc(preset.id) + '">'
        + '<span class="preset-row-marker"></span>'
        + buildThumb(preset.thumb)
        + '<span class="preset-row-name">' + esc(preset.name) + '</span>'
        + '<span class="preset-row-tag">' + tag + '</span>'
        + delBtn
        + '</button>';
    }).join('');

    list.querySelectorAll('.preset-row').forEach(row => {
      row.addEventListener('click', e => {
        if (e.target.classList.contains('preset-row-del')) return;
        const found = all.find(p => p.id === row.dataset.id);
        if (found) { applyPreset(found); closePresets(); }
      });
    });
    list.querySelectorAll('.preset-row-del').forEach(btn => {
      btn.addEventListener('click', e => {
        e.stopPropagation();
        deleteCustomPreset(btn.dataset.id);
      });
    });
  }

  document.getElementById('btn-save-preset').addEventListener('click', () => {
    const name = (prompt('Preset name:') || '').trim();
    if (!name) return;
    const id     = 'custom-' + Date.now();
    const custom = getCustomPresets();
    custom.push({ id, name: name.toUpperCase(), builtin: false, thumb: null, items: captureItems() });
    saveCustomPresets(custom);
    activePresetId = id;
    renderPresetList();
  });

  function deleteCustomPreset(id) {
    saveCustomPresets(getCustomPresets().filter(p => p.id !== id));
    if (activePresetId === id) activePresetId = null;
    renderPresetList();
  }

  function esc(s) {
    return String(s).replace(/[&<>"']/g, function(c) {
      return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
    });
  }

})();
</script>

</body>
</html>
