<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flighttracker Cyberdeck</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&display=swap" rel="stylesheet">
<style>

/* ── Reset ────────────────────────────────────────────────── */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: #070705;
  font-family: 'Share Tech Mono', monospace;
  color: #2e2e28;
}

/* ── Cockpit shell ────────────────────────────────────────── */
.cockpit {
  width: 100vw;
  height: 100vh;
  display: flex;
  flex-direction: column;
  padding: 6px 8px 8px;
  gap: 6px;
  /* Subtle radial vignette to make it feel like a physical panel */
  background:
    radial-gradient(ellipse 120% 80% at 50% -10%, #181814 0%, #070705 55%),
    /* Very faint crosshatch texture */
    repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(255,255,255,0.008) 39px, rgba(255,255,255,0.008) 40px),
    repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(255,255,255,0.008) 39px, rgba(255,255,255,0.008) 40px);
}

/* ── Cockpit header ───────────────────────────────────────── */
.cockpit-header {
  flex-shrink: 0;
  height: 28px;
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 0 6px;
  border-bottom: 1px solid #141410;
}

.hdr-logo {
  font-family: 'VT323', monospace;
  font-size: 17px;
  color: #302e28;
  letter-spacing: 0.35em;
  text-transform: uppercase;
  white-space: nowrap;
}

.hdr-divider {
  width: 1px;
  height: 14px;
  background: #181814;
  flex-shrink: 0;
}

.hdr-indicators {
  display: flex;
  align-items: center;
  gap: 10px;
  flex: 1;
}

.hdr-dot {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: #3a3830;
}

.hdr-dot.ok     { background: #2a5a2a; box-shadow: 0 0 4px #2a5a2a; }
.hdr-dot.warn   { background: #5a4a1a; box-shadow: 0 0 4px #5a4a1a; }

.hdr-status {
  font-size: 9px;
  color: #252520;
  letter-spacing: 0.28em;
}

.hdr-time {
  font-family: 'VT323', monospace;
  font-size: 19px;
  color: #2e2c26;
  letter-spacing: 0.15em;
  white-space: nowrap;
}

/* ── Panel rows ───────────────────────────────────────────── */
.cockpit-row {
  display: flex;
  gap: 6px;
  min-height: 0;
}

.row-top    { flex: 57 0 0; min-height: 0; }
.row-bottom { flex: 43 0 0; min-height: 0; }

/* ── Individual panel (bezel) ─────────────────────────────── */
.panel {
  display: flex;
  flex-direction: column;
  gap: 4px;
  min-width: 0;
  min-height: 0;
  padding: 9px 9px 5px;
  border-radius: 9px;
  position: relative;

  /* Brushed anodised aluminium bezel */
  background: linear-gradient(180deg, #1e1e1a 0%, #141412 50%, #101010 100%);
  box-shadow:
    /* Outer drop shadow */
    0 6px 28px rgba(0,0,0,0.95),
    0 2px 6px  rgba(0,0,0,0.8),
    /* Outer highlight rim (top edge) */
    0 0 0 1px rgba(255,255,255,0.035),
    /* Inner shadow (bottom edge — makes it look raised) */
    inset 0 -2px 4px rgba(0,0,0,0.7),
    inset 0  1px 0   rgba(255,255,255,0.06);
}

/* Corner mount brackets (decorative) */
.panel::before {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 9px;
  pointer-events: none;
  /* Four L-shaped corner marks */
  background:
    linear-gradient(to right,  #2a2a24 0, #2a2a24 2px, transparent 2px) 5px  5px  / 10px 10px no-repeat,
    linear-gradient(to bottom, #2a2a24 0, #2a2a24 2px, transparent 2px) 5px  5px  / 10px 10px no-repeat,
    linear-gradient(to left,   #2a2a24 0, #2a2a24 2px, transparent 2px) calc(100% - 5px) 5px / 10px 10px no-repeat,
    linear-gradient(to bottom, #2a2a24 0, #2a2a24 2px, transparent 2px) calc(100% - 5px) 5px / 10px 10px no-repeat,
    linear-gradient(to right,  #2a2a24 0, #2a2a24 2px, transparent 2px) 5px  calc(100% - 5px) / 10px 10px no-repeat,
    linear-gradient(to top,    #2a2a24 0, #2a2a24 2px, transparent 2px) 5px  calc(100% - 5px) / 10px 10px no-repeat,
    linear-gradient(to left,   #2a2a24 0, #2a2a24 2px, transparent 2px) calc(100% - 5px) calc(100% - 5px) / 10px 10px no-repeat,
    linear-gradient(to top,    #2a2a24 0, #2a2a24 2px, transparent 2px) calc(100% - 5px) calc(100% - 5px) / 10px 10px no-repeat;
}

/* ── Panel screen (the CRT glass) ────────────────────────── */
.panel-screen {
  flex: 1;
  min-height: 0;
  border-radius: 5px;
  overflow: hidden;
  position: relative;
  background: #050200;

  /* Recessed screen effect + amber CRT glow */
  box-shadow:
    inset 0 2px 12px rgba(0,0,0,0.95),
    inset 0 0  4px  rgba(0,0,0,0.6),
    0 0 22px rgba(255,160,64,0.10),
    0 0  8px rgba(255,160,64,0.06);
}

/* Vignette overlay (phosphor fade at edges) */
.panel-screen::before {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 5px;
  pointer-events: none;
  z-index: 2;
  background: radial-gradient(ellipse at 50% 50%, transparent 50%, rgba(0,0,0,0.50) 100%);
}

/* Scanline overlay on top of iframe */
.panel-screen::after {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 5px;
  pointer-events: none;
  z-index: 3;
  background: repeating-linear-gradient(
    to bottom,
    transparent  0px,
    transparent  2px,
    rgba(0,0,0,0.07) 2px,
    rgba(0,0,0,0.07) 3px
  );
}

iframe {
  width: 100%;
  height: 100%;
  border: none;
  display: block;
}

/* ── Panel label (under screen, inside bezel) ─────────────── */
.panel-id {
  font-size: 8px;
  color: #222220;
  text-align: center;
  letter-spacing: 0.40em;
  text-transform: uppercase;
  flex-shrink: 0;
  line-height: 1;
  user-select: none;
}

/* ── Panel flex-grow ratios ───────────────────────────────── */
.panel-flight   { flex: 56 0 0; }
.panel-vitals   { flex: 44 0 0; }
.panel-spectrum { flex: 40 0 0; }
.panel-weather  { flex: 34 0 0; }
.panel-radar    { flex: 26 0 0; }

</style>
</head>
<body>

<div class="cockpit">

  <!-- Header bar -->
  <div class="cockpit-header">
    <span class="hdr-logo">Flighttracker&nbsp;&nbsp;Cyberdeck&nbsp;&nbsp;MK.I</span>
    <div class="hdr-divider"></div>
    <div class="hdr-indicators">
      <div class="hdr-dot ok" id="dot-sys"   title="System"></div>
      <div class="hdr-dot ok" id="dot-data"  title="Data feed"></div>
      <div class="hdr-dot ok" id="dot-net"   title="Network"></div>
      <span class="hdr-status" id="hdr-status">ALL SYSTEMS NOMINAL</span>
    </div>
    <span class="hdr-time" id="hdr-clock">--:--:--</span>
  </div>

  <!-- Top row: Flight Display | System Vitals -->
  <div class="cockpit-row row-top">

    <div class="panel panel-flight">
      <div class="panel-screen">
        <iframe src="main.html?theme=color" title="Flight Display" loading="eager"></iframe>
      </div>
      <div class="panel-id">Flight&nbsp;Display</div>
    </div>

    <div class="panel panel-vitals">
      <div class="panel-screen">
        <iframe src="vitals.html" title="System Vitals" loading="eager"></iframe>
      </div>
      <div class="panel-id">Sys&nbsp;Vitals</div>
    </div>

  </div><!-- /.row-top -->

  <!-- Bottom row: RF Spectrum | Weather | Radar -->
  <div class="cockpit-row row-bottom">

    <div class="panel panel-spectrum">
      <div class="panel-screen">
        <iframe src="spectrum.html" title="RF Spectrum" loading="lazy"></iframe>
      </div>
      <div class="panel-id">RF&nbsp;Spectrum</div>
    </div>

    <div class="panel panel-weather">
      <div class="panel-screen">
        <iframe src="weather.html" title="Weather" loading="lazy"></iframe>
      </div>
      <div class="panel-id">Weather</div>
    </div>

    <div class="panel panel-radar">
      <div class="panel-screen">
        <iframe src="radar.html?sweep=on" title="Radar" loading="lazy"></iframe>
      </div>
      <div class="panel-id">Radar</div>
    </div>

  </div><!-- /.row-bottom -->

</div><!-- /.cockpit -->

<script>
  /* ── Header clock ── */
  function tick() {
    const now = new Date();
    const hh  = String(now.getHours()).padStart(2,'0');
    const mm  = String(now.getMinutes()).padStart(2,'0');
    const ss  = String(now.getSeconds()).padStart(2,'0');
    document.getElementById('hdr-clock').textContent = hh+':'+mm+':'+ss;
  }
  tick();
  setInterval(tick, 1000);

  /* ── Subtle status dot pulse ── */
  /* The dots are static-green for now; a future enhancement could
     poll /api/vitals and /api/ping to set warn/danger states. */
</script>

</body>
</html>
