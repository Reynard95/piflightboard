<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flight Board — E-Ink</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&display=swap" rel="stylesheet">
<link rel="stylesheet" href="eink.css">
</head>
<body>
<div class="board">

  <div class="hdr">
    <span class="hdr-title">✈ DEPARTURES</span>
    <span class="hdr-clock" id="clock">00:00:00</span>
  </div>

  <div class="col-hdrs">
    <div class="ch">FLIGHT</div>
    <div class="ch">FROM</div>
    <div class="ch">TO</div>
    <div class="ch">ALT FT</div>
    <div class="ch">SPD KT</div>
    <div class="ch">STATUS</div>
  </div>

  <div class="rows" id="rows"></div>

</div>
<script src="data.js"></script>
<script src="eink.js"></script>
</body>
</html>
