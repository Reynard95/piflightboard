name: Deploy to Flighttracker Pi

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # allow manual trigger from GitHub UI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Tailscale
        uses: tailscale/github-action@v3
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}
          tags: tag:ci

      - name: Deploy to Pi
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PI_TAILSCALE_IP }}
          username: ${{ secrets.PI_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            git config --global --add safe.directory /opt/flighttracker
            cd /opt/flighttracker
            if ! git pull origin main; then
              echo "[deploy] git pull failed — triggering full reinstall via systemd..."
              sudo systemctl start flightboard-reinstall
              echo "[deploy] Reinstall started. Monitor: sudo journalctl -u flightboard-reinstall -f"
              exit 0
            fi
            bash scripts/deploy.sh
          timeout: 120s
