name: Deploy to Flighttracker Pi

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # allow manual trigger from GitHub UI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  # ── Static analysis + E2E tests ──────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Static analysis (syntax + integrity)
        run: npm run test:static

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: E2E tests
        run: npm run test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  # ── Deploy to Pi (only if tests pass) ────────────────────────────────────
  deploy:
    name: Deploy
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Tailscale
        uses: tailscale/github-action@v3
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}
          tags: tag:ci

      - name: Deploy to Pi
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PI_TAILSCALE_IP }}
          username: ${{ secrets.PI_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            git config --global --add safe.directory /opt/flighttracker
            cd /opt/flighttracker
            if ! git pull origin main; then
              echo "[deploy] git pull failed — triggering full reinstall via systemd..."
              sudo systemctl start flightboard-reinstall
              echo "[deploy] Reinstall started. Monitor: sudo journalctl -u flightboard-reinstall -f"
              exit 0
            fi
            bash scripts/deploy.sh
          timeout: 120s
