# Flight Board Configuration
# Edit this file to customize the application

[READSB]
# Connection to readsb API
host = localhost
port = 8080
timeout = 5

[RECEIVER]
# Your receiver location (update with your coordinates)
latitude = 52.0116
longitude = 4.7093
altitude = 0

[WEB_SERVER]
# Flask web server settings
host = 0.0.0.0
port = 5000
debug = False

[DISPLAY]
# Update frequency in milliseconds (1000 = 1 second)
update_interval = 2000

# Display preferences
show_logo = True
show_details = True
show_route = True

[AIRLINE_LOGOS]
# Logo source from airline-logos repo
# Options: flightaware_logos, fr24_banners, radarbox_banners, custom_logos
source = flightaware_logos

# GitHub repository URL
repo_url = https://raw.githubusercontent.com/Jxck-S/airline-logos/main
